<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${cours.titre} + ' - Apprentissage'">Apprentissage</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    body { font-family: 'Manrope', sans-serif; background: linear-gradient(135deg, #edf4ff 0%, #f8fafc 55%, #eef7f3 100%); }
    .bg-primary { background-color: #123a78; }
    .text-primary { color: #123a78; }
    .border-primary { border-color: #123a78; }
    .progress-bar { transition: width 0.4s ease; }
    .sidebar-card { backdrop-filter: blur(14px); background: rgba(255,255,255,0.92); }
    .content-shell { background: rgba(255,255,255,0.92); box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08); }
    .chapter-item.active { border-color: #123a78; background: rgba(18,58,120,0.08); }
    .chapter-item { transition: all 0.2s ease; }
  </style>
</head>
<body class="text-slate-900">
<nav class="fixed inset-x-0 top-0 z-50 h-16 border-b border-white/80 bg-white/80 backdrop-blur-xl">
  <div class="h-full max-w-7xl mx-auto px-4 md:px-8 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <a href="/etudiant/mes-cours" class="inline-flex items-center gap-2 text-slate-500 hover:text-primary">
        <span class="material-symbols-outlined">arrow_back</span>
        <span class="hidden md:inline">Mes cours</span>
      </a>
      <div>
        <p class="text-xs uppercase tracking-[0.24em] text-slate-400">Lecture guidee</p>
        <p class="text-lg font-extrabold tracking-tight text-primary">L'Erudition</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <div class="hidden md:block text-right">
        <p class="text-sm font-bold" th:text="${etudiant.nomComplet}">Etudiant</p>
        <p class="text-xs text-slate-500">Progression synchronisee</p>
      </div>
      <div class="h-10 w-10 rounded-2xl bg-primary text-white flex items-center justify-center font-bold">
        <span th:text="${etudiant != null ? #strings.substring(etudiant.prenom, 0, 1) : 'E'} + ${etudiant != null ? #strings.substring(etudiant.nom, 0, 1) : 'T'}">ET</span>
      </div>
    </div>
  </div>
</nav>

<div class="max-w-7xl mx-auto px-4 md:px-8 pt-24 pb-8">
  <div class="grid grid-cols-1 xl:grid-cols-[320px_minmax(0,1fr)] gap-6">
    <aside class="sidebar-card rounded-[28px] border border-white/70 p-5 h-fit xl:sticky xl:top-24">
      <div class="pb-5 border-b border-slate-100">
        <p class="text-xs uppercase tracking-[0.24em] text-slate-400">Cours</p>
        <h1 class="text-xl font-extrabold mt-2 leading-tight" th:text="${cours.titre}">Titre du cours</h1>
        <div class="mt-5">
          <div class="flex justify-between text-sm text-slate-500 mb-2">
            <span>Progression globale</span>
            <span id="globalProgression" th:text="${cours.progression} + '%'">0%</span>
          </div>
          <div class="w-full h-2.5 rounded-full bg-slate-200 overflow-hidden">
            <div id="globalProgressBar" class="progress-bar bg-primary h-full rounded-full" th:style="'width:' + ${cours.progression} + '%'"></div>
          </div>
        </div>
      </div>

      <div id="sidebarContent" class="pt-5 space-y-4"></div>

      <div th:if="${quizzes != null and not #lists.isEmpty(quizzes)}" class="mt-5 pt-5 border-t border-slate-100">
        <p class="text-xs uppercase tracking-[0.24em] text-slate-400 mb-3">Quiz du cours</p>
        <div class="space-y-2">
          <a th:each="quiz : ${quizzes}" th:href="'/etudiant/cours/' + ${cours.id} + '/quiz/' + ${quiz.id}"
             class="flex items-center justify-between rounded-2xl border border-indigo-100 bg-indigo-50/70 px-4 py-3 text-indigo-700 hover:bg-indigo-100/80">
            <span class="inline-flex items-center gap-2">
              <span class="material-symbols-outlined text-sm">quiz</span>
              <span class="text-sm font-semibold" th:text="${quiz.titre}">Quiz</span>
            </span>
            <span class="material-symbols-outlined text-sm">arrow_forward</span>
          </a>
        </div>
      </div>
    </aside>

    <main class="space-y-6">
      <section class="content-shell rounded-[32px] border border-white/70 p-6 md:p-8">
        <div class="flex flex-col gap-3 md:flex-row md:items-start md:justify-between">
          <div>
            <div class="flex flex-wrap items-center gap-2 text-sm text-slate-500">
              <span id="currentSectionName"></span>
              <span class="material-symbols-outlined text-sm">chevron_right</span>
              <span id="currentChapitreName"></span>
            </div>
            <h2 id="currentContentTitle" class="text-2xl md:text-3xl font-extrabold mt-3"></h2>
            <div class="flex flex-wrap items-center gap-3 mt-3">
              <span id="currentContentType" class="inline-flex items-center rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-600"></span>
              <span id="contentCounter" class="text-sm text-slate-400"></span>
            </div>
          </div>
          <div class="rounded-2xl bg-slate-50 border border-slate-100 px-4 py-3 min-w-[220px]">
            <p class="text-xs uppercase tracking-[0.22em] text-slate-400">Ordre de lecture</p>
            <p id="currentPathHint" class="text-sm font-semibold text-slate-700 mt-2">Chapitre</p>
          </div>
        </div>

        <div id="contentArea" class="mt-8 min-h-[500px] rounded-[28px] border border-slate-100 bg-white p-5 md:p-8">
          <div class="text-center text-slate-400 py-20">
            <span class="material-symbols-outlined text-5xl mb-3">menu_book</span>
            <p>Chargement du cours...</p>
          </div>
        </div>
      </section>

      <section class="content-shell rounded-[28px] border border-white/70 p-5 md:p-6">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
          <button id="prevContentBtn" class="inline-flex items-center justify-center gap-2 rounded-2xl border border-slate-200 bg-white px-5 py-3 font-semibold text-slate-700 hover:bg-slate-50">
            <span class="material-symbols-outlined">chevron_left</span>
            Precedent
          </button>
          <div class="flex flex-col sm:flex-row gap-3">
            <button id="markCompleteBtn" class="inline-flex items-center justify-center gap-2 rounded-2xl bg-emerald-600 px-5 py-3 font-semibold text-white hover:bg-emerald-700">
              <span class="material-symbols-outlined">check_circle</span>
              Marquer comme termine
            </button>
            <button id="nextContentBtn" class="inline-flex items-center justify-center gap-2 rounded-2xl bg-primary px-5 py-3 font-semibold text-white hover:opacity-95">
              Suivant
              <span class="material-symbols-outlined">chevron_right</span>
            </button>
          </div>
        </div>
      </section>
    </main>
  </div>
</div>

<script th:inline="javascript">
  const coursData = /*[[${cours}]]*/ null;
  const coursId = coursData ? coursData.id : null;
  let sections = [];
  let chapitresListe = [];
  let currentChapitreIndex = 0;
  let currentContenuIndex = 0;
  let currentContenuId = null;
  let currentContenuComplete = false;

  function escapeHtml(text) {
    if (!text) return '';
    return String(text).replace(/[&<>]/g, function(m) {
      return m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;');
    });
  }

  function getTypeLabel(type) {
    switch (type) {
      case 'VIDEO': return 'Video';
      case 'TEXTE': return 'Texte';
      case 'PDF': return 'PDF';
      case 'LIEN': return 'Lien externe';
      case 'IMAGE': return 'Image';
      default: return 'Contenu';
    }
  }

  function genererHtmlContenu(contenu) {
    const titre = contenu.titre || '';

    if (contenu.typeContenu === 'VIDEO') {
      if (!contenu.videoUrl) return "<div class='text-center py-16 text-slate-400'>Video non disponible</div>";
      return `
        <div class="space-y-5">
          <h3 class="text-xl font-bold">${escapeHtml(titre)}</h3>
          <video controls class="w-full rounded-3xl border border-slate-200 bg-slate-950" controlsList="nodownload">
            <source src="${contenu.videoUrl}" type="video/mp4">
            Votre navigateur ne supporte pas la video.
          </video>
        </div>`;
    }

    if (contenu.typeContenu === 'TEXTE') {
      const texte = contenu.contenuTexte || contenu.htmlContent || '';
      if (!texte) return "<div class='text-center py-16 text-slate-400'>Texte non disponible</div>";
      return `
        <article class="prose prose-slate max-w-none">
          <h3>${escapeHtml(titre)}</h3>
          <div>${texte}</div>
        </article>`;
    }

    if (contenu.typeContenu === 'PDF') {
      if (!contenu.fichierUrl) return "<div class='text-center py-16 text-slate-400'>PDF non disponible</div>";
      return `
        <div class="space-y-5">
          <h3 class="text-xl font-bold">${escapeHtml(titre)}</h3>
          <iframe src="${contenu.fichierUrl}" class="w-full h-[680px] rounded-3xl border border-slate-200"></iframe>
          <a href="${contenu.fichierUrl}" class="inline-flex items-center gap-2 rounded-2xl bg-primary px-4 py-3 text-white font-semibold">
            <span class="material-symbols-outlined text-sm">download</span>
            Telecharger le PDF
          </a>
        </div>`;
    }

    if (contenu.typeContenu === 'IMAGE') {
      if (!contenu.fichierUrl) return "<div class='text-center py-16 text-slate-400'>Image non disponible</div>";
      return `
        <div class="space-y-5">
          <h3 class="text-xl font-bold">${escapeHtml(titre)}</h3>
          <img src="${contenu.fichierUrl}" alt="${escapeHtml(titre)}" class="w-full rounded-3xl border border-slate-200">
        </div>`;
    }

    if (contenu.typeContenu === 'LIEN') {
      if (!contenu.lienExterne) return "<div class='text-center py-16 text-slate-400'>Lien non disponible</div>";
      return `
        <div class="space-y-5">
          <h3 class="text-xl font-bold">${escapeHtml(titre)}</h3>
          <a href="${contenu.lienExterne}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 rounded-2xl border border-primary/20 bg-blue-50 px-4 py-3 text-primary font-semibold">
            <span class="material-symbols-outlined text-sm">open_in_new</span>
            ${escapeHtml(contenu.lienTexte || contenu.titre || 'Ouvrir le lien')}
          </a>
        </div>`;
    }

    return "<div class='text-center py-16 text-slate-400'>Contenu non pris en charge</div>";
  }

  function ajouterChapitre(section, chapitre, parentPath) {
    const path = parentPath ? parentPath + ' / ' + (chapitre.titre || 'Chapitre') : (chapitre.titre || 'Chapitre');
    const chapitreData = {
      id: chapitre.id,
      titre: chapitre.titre || 'Chapitre',
      path: path,
      sectionNom: section.titre || 'Section',
      contenus: []
    };

    const contenus = [...(chapitre.contenus || [])].sort((a, b) => (a.ordre || 0) - (b.ordre || 0));
    contenus.forEach(contenu => {
      chapitreData.contenus.push({
        id: contenu.id,
        titre: contenu.titre,
        typeContenu: contenu.typeContenu,
        estComplete: contenu.estComplete || false,
        videoUrl: contenu.videoUrl,
        contenuTexte: contenu.contenuTexte,
        fichierUrl: contenu.fichierUrl,
        lienExterne: contenu.lienExterne,
        lienTexte: contenu.lienTexte,
        htmlContent: contenu.htmlContent
      });
    });

    if (chapitreData.contenus.length > 0) {
      chapitresListe.push(chapitreData);
    }

    const sousChapitres = [...(chapitre.sousChapitres || [])].sort((a, b) => (a.ordre || 0) - (b.ordre || 0));
    sousChapitres.forEach(sousChapitre => ajouterChapitre(section, sousChapitre, path));
  }

  function organiserDonnees() {
    if (!coursData || !coursData.sections) {
      return false;
    }

    sections = [...coursData.sections].sort((a, b) => (a.ordre || 0) - (b.ordre || 0));
    chapitresListe = [];

    sections.forEach(section => {
      const chapitres = [...(section.chapitres || [])].sort((a, b) => (a.ordre || 0) - (b.ordre || 0));
      chapitres.forEach(chapitre => ajouterChapitre(section, chapitre, ''));
    });

    return chapitresListe.length > 0;
  }

  function initSidebar() {
    const sidebar = document.getElementById('sidebarContent');
    if (chapitresListe.length === 0) {
      sidebar.innerHTML = "<div class='rounded-2xl border border-dashed border-slate-200 bg-slate-50 p-4 text-sm text-slate-500'>Aucun contenu disponible.</div>";
      return;
    }

    const sectionsMap = new Map();
    chapitresListe.forEach((chapitre, index) => {
      if (!sectionsMap.has(chapitre.sectionNom)) {
        sectionsMap.set(chapitre.sectionNom, []);
      }
      sectionsMap.get(chapitre.sectionNom).push({ ...chapitre, globalIndex: index });
    });

    let html = '';
    sectionsMap.forEach((chapitres, sectionName) => {
      html += `<div class="rounded-3xl border border-slate-100 bg-slate-50/80 p-3">
        <div class="px-2 pb-2">
          <p class="text-xs uppercase tracking-[0.22em] text-slate-400">${escapeHtml(sectionName)}</p>
        </div>`;

      chapitres.forEach(item => {
        const doneCount = item.contenus.filter(c => c.estComplete).length;
        const progress = item.contenus.length ? Math.round((doneCount / item.contenus.length) * 100) : 0;
        const activeClass = item.globalIndex === currentChapitreIndex ? 'active' : '';
        html += `<button type="button" class="chapter-item ${activeClass} w-full text-left rounded-2xl border border-transparent px-3 py-3 mb-2 last:mb-0" onclick="goToChapitre(${item.globalIndex})">
          <div class="flex items-start justify-between gap-3">
            <div>
              <p class="text-sm font-semibold text-slate-800">${escapeHtml(item.path)}</p>
              <p class="text-xs text-slate-400 mt-1">${doneCount}/${item.contenus.length} contenu(s) termines</p>
            </div>
            <span class="text-xs text-slate-400">${progress}%</span>
          </div>
          <div class="mt-3 h-1.5 rounded-full bg-slate-200 overflow-hidden">
            <div class="h-full rounded-full bg-primary" style="width:${progress}%"></div>
          </div>
        </button>`;
      });

      html += '</div>';
    });

    sidebar.innerHTML = html;
  }

  function chargerContenuCourant() {
    const chapitre = chapitresListe[currentChapitreIndex];
    if (!chapitre) return;
    const contenu = chapitre.contenus[currentContenuIndex];
    if (!contenu) return;

    currentContenuId = contenu.id;
    currentContenuComplete = contenu.estComplete || false;

    document.getElementById('currentSectionName').textContent = chapitre.sectionNom;
    document.getElementById('currentChapitreName').textContent = chapitre.path;
    document.getElementById('currentPathHint').textContent = chapitre.path;
    document.getElementById('currentContentTitle').textContent = contenu.titre || 'Contenu';
    document.getElementById('currentContentType').textContent = getTypeLabel(contenu.typeContenu);
    document.getElementById('contentCounter').textContent = `Contenu ${currentContenuIndex + 1} / ${chapitre.contenus.length}`;
    document.getElementById('contentArea').innerHTML = genererHtmlContenu(contenu);

    updateButtonsState();
    initSidebar();
  }

  function updateButtonsState() {
    const prevBtn = document.getElementById('prevContentBtn');
    const nextBtn = document.getElementById('nextContentBtn');
    const markBtn = document.getElementById('markCompleteBtn');
    const chapitre = chapitresListe[currentChapitreIndex];

    prevBtn.disabled = currentChapitreIndex === 0 && currentContenuIndex === 0;
    prevBtn.classList.toggle('opacity-50', prevBtn.disabled);

    markBtn.disabled = currentContenuComplete;
    markBtn.classList.toggle('opacity-50', markBtn.disabled);

    const isLastContent = currentContenuIndex === chapitre.contenus.length - 1;
    const isLastChapter = currentChapitreIndex === chapitresListe.length - 1;
    nextBtn.disabled = isLastContent && isLastChapter;
    nextBtn.classList.toggle('opacity-50', nextBtn.disabled);
  }

  function goToChapitre(index) {
    currentChapitreIndex = index;
    currentContenuIndex = 0;
    chargerContenuCourant();
  }

  function goToPrevious() {
    if (currentContenuIndex > 0) {
      currentContenuIndex--;
    } else if (currentChapitreIndex > 0) {
      currentChapitreIndex--;
      currentContenuIndex = chapitresListe[currentChapitreIndex].contenus.length - 1;
    }
    chargerContenuCourant();
  }

  function goToNext() {
    const chapitre = chapitresListe[currentChapitreIndex];
    if (!currentContenuComplete) {
      alert("Veuillez d'abord marquer ce contenu comme termine.");
      return;
    }

    if (currentContenuIndex < chapitre.contenus.length - 1) {
      currentContenuIndex++;
    } else if (currentChapitreIndex < chapitresListe.length - 1) {
      currentChapitreIndex++;
      currentContenuIndex = 0;
    }

    chargerContenuCourant();
  }

  function markContentComplete() {
    if (!currentContenuId || !coursId || currentContenuComplete) return;

    $.ajax({
      url: '/etudiant/cours/' + coursId + '/contenu/' + currentContenuId + '/completer',
      method: 'POST',
      success: function(response) {
        if (!response.success) {
          alert(response.message || 'Erreur de mise a jour');
          return;
        }

        chapitresListe[currentChapitreIndex].contenus[currentContenuIndex].estComplete = true;
        currentContenuComplete = true;
        document.getElementById('globalProgression').textContent = response.progression + '%';
        document.getElementById('globalProgressBar').style.width = response.progression + '%';
        updateButtonsState();
        initSidebar();

        setTimeout(function() {
          const chapitre = chapitresListe[currentChapitreIndex];
          const isLastContent = currentContenuIndex === chapitre.contenus.length - 1;
          const isLastChapter = currentChapitreIndex === chapitresListe.length - 1;
          if (!(isLastContent && isLastChapter)) {
            goToNext();
          }
        }, 500);
      },
      error: function() {
        alert('Erreur lors de la mise a jour de la progression.');
      }
    });
  }

  function trouverPremierContenuNonComplete() {
    for (let i = 0; i < chapitresListe.length; i++) {
      for (let j = 0; j < chapitresListe[i].contenus.length; j++) {
        if (!chapitresListe[i].contenus[j].estComplete) {
          return { chapitreIdx: i, contenuIdx: j };
        }
      }
    }
    return { chapitreIdx: 0, contenuIdx: 0 };
  }

  function init() {
    const hasData = organiserDonnees();
    if (!hasData) {
      document.getElementById('contentArea').innerHTML = "<div class='text-center py-20 text-slate-400'><span class='material-symbols-outlined text-5xl mb-3'>menu_book</span><p>Aucun contenu disponible pour ce cours.</p></div>";
      initSidebar();
      return;
    }

    const first = trouverPremierContenuNonComplete();
    currentChapitreIndex = first.chapitreIdx;
    currentContenuIndex = first.contenuIdx;
    chargerContenuCourant();
  }

  document.getElementById('prevContentBtn').addEventListener('click', goToPrevious);
  document.getElementById('nextContentBtn').addEventListener('click', goToNext);
  document.getElementById('markCompleteBtn').addEventListener('click', markContentComplete);
  window.goToChapitre = goToChapitre;
  init();
</script>
</body>
</html>

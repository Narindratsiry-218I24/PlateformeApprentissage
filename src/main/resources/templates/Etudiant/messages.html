<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{Etudiant/layout}" lang="fr">
<head>
    <title>Messagerie - L'Érudition</title>
    <style>
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .conversation-item { transition: all 0.2s ease; cursor: pointer; }
        .conversation-item:hover { background: #F8FAFC; }
        .conversation-item.active { background: white; border-left: 3px solid var(--secondary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
<div layout:fragment="content">
    <div th:if="${error}" class="mb-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-2xl font-semibold">
        <i class="fas fa-triangle-exclamation mr-2"></i><span th:text="${error}">Erreur</span>
    </div>
    <div th:if="${success}" class="mb-6 p-4 bg-emerald-50 border border-emerald-200 text-emerald-700 rounded-2xl font-semibold">
        <i class="fas fa-check-circle mr-2"></i><span th:text="${success}">Succès</span>
    </div>
    <div class="flex h-[calc(100vh-110px)] bg-white rounded-2xl overflow-hidden border border-gray-100">
        <div class="w-full md:w-80 bg-gray-50 border-r border-gray-200 flex flex-col">
            <div class="p-5 border-b border-gray-200">
                <h2 class="font-bold text-gray-900">Messages</h2>
                <button onclick="openNewMessageModal()" class="mt-3 w-full flex items-center justify-center gap-2 bg-primary text-white py-2.5 rounded-xl text-sm font-semibold hover:bg-primary-dark transition">
                    <i class="fas fa-plus"></i> Nouveau message
                </button>
            </div>
            <div class="flex-1 overflow-y-auto">
                <a th:each="conv : ${conversations}"
                   th:href="@{/messages/{id}(id=${conv.id})}"
                   class="conversation-item p-4 border-b border-gray-100 block"
                   th:classappend="${currentConversationId == conv.id} ? 'active' : ''">
                    <div class="flex gap-3">
                        <div class="w-10 h-10 rounded-xl bg-secondary flex items-center justify-center text-white font-bold" 
                             th:with="otherName=${conv.getOtherParticipantName(userId)}" 
                             th:text="${(otherName != null && !otherName.isEmpty()) ? #strings.substring(otherName, 0, 1) : '?'}">P</div>
                        <div class="flex-1 min-w-0">
                            <p class="font-semibold text-gray-900 truncate" th:text="${conv.getOtherParticipantName(userId)}">Nom</p>
                            <p class="text-xs text-gray-500 truncate" th:text="${conv.lastMessagePreview}">Dernier message</p>
                        </div>
                        <div th:if="${conv.unreadCount > 0}" class="bg-secondary text-white text-[10px] px-2 py-0.5 rounded-full h-5 flex items-center" th:text="${conv.unreadCount}">3</div>
                    </div>
                </a>
                <div th:if="${#lists.isEmpty(conversations)}" class="text-center py-12 text-gray-400">
                    <i class="fas fa-comments text-4xl mb-3 block"></i>
                    <p>Aucune conversation</p>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col" th:if="${currentConversationId != null and currentConversation != null}">
            <div class="p-5 border-b border-gray-200 bg-white">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-secondary flex items-center justify-center text-white font-bold" 
                         th:with="otherName=${currentConversation.getOtherParticipantName(userId)}" 
                         th:text="${(otherName != null && !otherName.isEmpty()) ? #strings.substring(otherName, 0, 1) : '?'}">P</div>
                    <div>
                        <p class="font-bold text-gray-900" th:with="otherName=${currentConversation.getOtherParticipantName(userId)}" th:text="${otherName}">Nom</p>
                        <p class="text-xs text-gray-500" th:if="${role == 'professeur'}">Étudiant</p>
                        <p class="text-xs text-gray-500" th:if="${role == 'etudiant'}">Professeur</p>
                        <div class="flex items-center gap-2 mt-1" id="onlineStatusIndicator" style="display: none;">
                            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                            <span class="text-[10px] font-bold text-emerald-600 uppercase tracking-wider">En ligne</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-5 space-y-4 bg-gray-50 flex flex-col" id="messagesContainer">
                <div th:each="msg : ${messages}" class="flex flex-col" th:classappend="${msg.senderId == userId} ? 'items-end' : 'items-start'">
                    <div th:if="${msg.senderId == userId}" class="bg-primary text-white px-4 py-2 rounded-2xl rounded-br-none max-w-[75%] shadow-md">
                        <div th:if="${msg.fileUrl}" class="mb-2 p-2 bg-white/10 rounded-xl border border-white/20 flex items-center gap-3">
                            <i class="fas fa-file text-white"></i>
                            <a th:href="${msg.fileUrl}" target="_blank" class="text-xs font-bold hover:underline truncate" th:text="${msg.fileName}">Fichier</a>
                        </div>
                        <p class="text-sm" th:text="${msg.content}">Message</p>
                        <p class="text-[9px] text-white/50 text-right mt-1" th:text="${msg.formattedTime}">12:00</p>
                    </div>
                    <div th:if="${msg.senderId != userId}" class="bg-white border border-gray-200 px-4 py-2 rounded-2xl rounded-bl-none max-w-[75%] shadow-sm">
                        <div th:if="${msg.fileUrl}" class="mb-2 p-2 bg-slate-50 rounded-xl border border-slate-200 flex items-center gap-3">
                            <i class="fas fa-file text-primary"></i>
                            <a th:href="${msg.fileUrl}" target="_blank" class="text-xs font-bold text-primary hover:underline truncate" th:text="${msg.fileName}">Fichier</a>
                        </div>
                        <p class="text-sm" th:text="${msg.content}">Message</p>
                        <p class="text-[9px] text-gray-400 mt-1" th:text="${msg.formattedTime}">12:00</p>
                    </div>
                </div>
            </div>

            <div class="p-4 border-t border-gray-200 bg-white">
                <form th:action="'/messages/' + ${currentConversationId} + '/envoyer'" method="post" enctype="multipart/form-data" class="flex items-center gap-3">
                    <input type="hidden" name="receiverId" th:value="${currentConversation.getOtherParticipantId(userId)}">
                    <input type="hidden" name="receiverName" th:value="${currentConversation.getOtherParticipantName(userId)}">
                    <input type="hidden" name="receiverRole" th:value="${currentConversation.getOtherParticipantRole(userId)}">
                    
                    <label class="w-11 h-11 rounded-full bg-slate-100 flex items-center justify-center cursor-pointer hover:bg-slate-200 transition-colors shrink-0">
                        <i class="fas fa-paperclip text-slate-500"></i>
                        <input type="file" name="file" class="hidden" onchange="updateFileLabel(this)">
                    </label>
                    
                    <div class="flex-1 relative">
                        <input type="text" name="content" placeholder="Écrivez votre message..." class="w-full border border-gray-200 rounded-full px-5 py-3 text-sm focus:outline-none focus:border-secondary">
                        <div id="filePreview" class="hidden absolute -top-12 left-0 bg-secondary text-white text-[10px] px-3 py-1 rounded-full font-bold"></div>
                    </div>
                    
                    <button type="submit" class="w-11 h-11 rounded-full bg-primary text-white flex items-center justify-center hover:bg-primary-dark shrink-0">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>

        <div th:if="${currentConversationId == null}" class="flex-1 flex items-center justify-center text-gray-400">
            <div class="text-center">
                <i class="fas fa-comments text-5xl mb-4 block"></i>
                <p>Selectionnez une conversation</p>
            </div>
        </div>
    </div>
</div>

<!-- Modal Nouveau Message - placed in modals fragment -->
<div layout:fragment="modals">
<div id="newMessageModal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="bg-white rounded-2xl w-full max-w-md p-6">
        <div class="flex justify-between items-center mb-5">
            <h3 class="text-xl font-bold">Nouveau message</h3>
            <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
        </div>
        <form action="/messages/nouvelle" method="post" enctype="multipart/form-data">
            <div class="mb-4">
                <label class="text-sm font-semibold block mb-2">Destinataire</label>
                <select name="destinataireId" required class="w-full border border-gray-200 rounded-xl px-4 py-3">
                    <option value="">Selectionner</option>
                    <option th:each="u : ${interlocuteurs}" th:value="${u.id}" th:text="${u.prenom + ' ' + u.nom + ' (' + u.email + ')'}"></option>
                </select>
            </div>
            <div class="mb-4">
                <label class="text-sm font-semibold block mb-2">Message</label>
                <textarea name="content" rows="4" class="w-full border border-gray-200 rounded-xl px-4 py-3 resize-none" placeholder="Votre message..."></textarea>
            </div>
            <div class="mb-6">
                <label class="text-sm font-semibold block mb-2">Piece jointe (Optionnel)</label>
                <input type="file" name="file" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-primary/5 file:text-primary hover:file:bg-primary/10">
            </div>
            <div class="flex justify-end gap-3">
                <button type="button" onclick="closeModal()" class="px-4 py-2 border border-gray-200 rounded-xl">Annuler</button>
                <button type="submit" class="px-5 py-2 bg-primary text-white rounded-xl font-semibold">Envoyer</button>
            </div>
        </form>
    </div>
</div>
</div>

<script layout:fragment="script" th:inline="javascript">
    function openNewMessageModal() { document.getElementById('newMessageModal').classList.add('active'); }
    function closeModal() { document.getElementById('newMessageModal').classList.remove('active'); }
    function updateFileLabel(input) {
        const preview = document.getElementById('filePreview');
        if (input.files && input.files[0]) {
            preview.textContent = "Fichier : " + input.files[0].name;
            preview.classList.remove('hidden');
        } else {
            preview.classList.add('hidden');
        }
    }
    const container = document.getElementById('messagesContainer');
    if (container) container.scrollTop = container.scrollHeight;

    // --- WebSocket Logic ---
    let stompClient = null;
    const currentUserId = /*[[${userId}]]*/ '';
    const currentConversationId = /*[[${currentConversationId}]]*/ '';
    const otherParticipantId = /*[[${currentConversation != null ? currentConversation.getOtherParticipantId(userId) : ''}]]*/ '';

    function connect() {
        // Fetch initial online users
        fetch('/messages/online-users')
            .then(res => res.json())
            .then(onlineUsers => {
                const indicator = document.getElementById('onlineStatusIndicator');
                if (indicator && otherParticipantId && onlineUsers.includes(otherParticipantId)) {
                    indicator.style.display = 'flex';
                }
            })
            .catch(err => console.error("Could not fetch online users", err));

        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;
        stompClient.connect({}, function (frame) {
            console.log('Connected: ' + frame);
            
            if (currentConversationId) {
                stompClient.subscribe('/topic/messages/' + currentConversationId, function (message) {
                    showMessage(JSON.parse(message.body));
                });
            }
            
            stompClient.subscribe('/topic/notifications/' + currentUserId, function (notification) {
                console.log("New message received");
            });
            
            stompClient.subscribe('/topic/online-users', function (message) {
                const onlineUsers = JSON.parse(message.body);
                const indicator = document.getElementById('onlineStatusIndicator');
                if (indicator) {
                    if (otherParticipantId && onlineUsers.includes(otherParticipantId)) {
                        indicator.style.display = 'flex';
                    } else {
                        indicator.style.display = 'none';
                    }
                }
            });
        });
    }

    fetch('/messages/online-users')
        .then(resp => resp.ok ? resp.json() : [])
        .then(onlineUsers => {
            const indicator = document.getElementById('onlineStatusIndicator');
            if (indicator) {
                if (otherParticipantId && onlineUsers.includes(otherParticipantId)) {
                    indicator.style.display = 'flex';
                } else {
                    indicator.style.display = 'none';
                }
            }
        })
        .catch(() => {});

    function showMessage(msg) {
        if (!container) return;
        
        if (msg.senderId === currentUserId) {
            return; 
        }

        const div = document.createElement('div');
        div.className = 'flex flex-col items-start';
        
        let fileHtml = '';
        if (msg.fileUrl) {
            fileHtml = `
                <div class="mb-2 p-2 bg-slate-50 rounded-xl border border-slate-200 flex items-center gap-3">
                    <i class="fas fa-file text-primary"></i>
                    <a href="${msg.fileUrl}" target="_blank" class="text-xs font-bold text-primary hover:underline truncate">${msg.fileName}</a>
                </div>
            `;
        }

        div.innerHTML = `
            <div class="bg-white border border-gray-200 px-4 py-2 rounded-2xl rounded-bl-none max-w-[75%] shadow-sm">
                ${fileHtml}
                <p class="text-sm">${msg.content}</p>
                <p class="text-[9px] text-gray-400 mt-1">${msg.formattedTime || 'A l\'instant'}</p>
            </div>
        `;
        
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    connect();
</script>
</body>
</html>

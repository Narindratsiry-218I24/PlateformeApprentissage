<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{Etudiant/layout}" lang="fr">
<head>
    <title>Mes cours - L'Érudition</title>
</head>
<body>
<div layout:fragment="content">
    <div class="mb-8">
        <h1 class="text-3xl font-black text-gray-900">Mes cours</h1>
        <p class="text-gray-500 mt-1">Retrouvez tous les cours auxquels vous êtes inscrit</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div th:each="c : ${cours}" class="course-card">
            <div class="h-40 bg-gray-100 relative">
                <img th:src="${c.imageCouverture}" class="w-full h-full object-cover" th:if="${c.imageCouverture != null}">
                <div class="absolute top-3 left-3">
                    <form th:action="'/etudiant/cours/' + ${c.id} + '/favori'" method="post">
                        <button type="submit" class="w-8 h-8 rounded-full bg-white flex items-center justify-center shadow-md hover:scale-110 transition-transform">
                            <i th:class="${c.favori} ? 'fi fi-sr-heart text-red-500' : 'fi fi-rr-heart text-gray-400'"></i>
                        </button>
                    </form>
                </div>
                <div class="absolute top-3 right-3">
                    <span th:if="${c.publie}" class="text-xs bg-green-100 text-green-700 px-3 py-1 rounded-full">Publié</span>
                </div>
            </div>
            <div class="p-5">
                <h3 class="font-bold text-lg text-gray-900 mb-1" th:text="${c.titre}">Titre</h3>
                <p class="text-xs text-gray-500 mb-2" th:text="${c.professeur}">Professeur</p>
                <p class="text-sm text-gray-500 line-clamp-2 mb-3" th:text="${c.descriptionCourte}">Description</p>
                <div class="mb-3">
                    <div class="flex justify-between text-sm text-gray-600 mb-1">
                        <span>Progression</span>
                        <span th:text="${c.progression} + '%'">0%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2">
                        <div class="progress-bar bg-primary h-2 rounded-full" th:style="'width: ' + ${c.progression} + '%'"></div>
                    </div>
                </div>
                <a th:href="'/etudiant/cours/' + ${c.id} + '/continuer'" class="block text-center w-full py-2 bg-primary text-white rounded-xl hover:bg-primary-dark text-sm font-medium">Continuer</a>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(cours)}" class="bg-white rounded-2xl p-16 text-center text-gray-500">
        <i class="fi fi-br-book-alt text-6xl text-gray-300 mb-4 block"></i>
        <p class="text-xl mb-2">Vous n'êtes inscrit à aucun cours</p>
        <a href="/etudiant/catalogue" class="inline-block mt-6 px-6 py-3 bg-primary text-white rounded-xl">Découvrir des cours</a>
    </div>
</div>
</body>
</html>

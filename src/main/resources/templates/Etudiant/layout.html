<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'L\'Erudition - Etudiant'">L'Erudition - Etudiant</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--primary)',
                        'primary-dark': 'var(--primary-dark)',
                        secondary: 'var(--secondary)',
                        accent: 'var(--accent)'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-bold-rounded/css/uicons-bold-rounded.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-rounded/css/uicons-solid-rounded.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F8FAFC; }

        :root {
            --primary: #1e3a8a;
            --primary-light: #2563eb;
            --primary-dark: #172554;
            --secondary: #ca8a04;
            --accent: #10b981;
        }

        .sidebar-etudiant {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 280px;
            background: var(--primary);
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar-etudiant .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            margin: 4px 0 4px 20px;
            border-radius: 30px 0 0 30px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
            transition: all 0.2s ease;
            position: relative;
        }

        .sidebar-etudiant .nav-item:hover {
            color: #FFFFFF;
        }

        .sidebar-etudiant .nav-item.active {
            background: #F8FAFC;
            color: var(--primary);
        }

        .sidebar-etudiant .nav-item.active::before {
            content: '';
            position: absolute;
            top: -20px;
            right: 0;
            width: 20px;
            height: 20px;
            background: transparent;
            border-bottom-right-radius: 20px;
            box-shadow: 10px 10px 0 10px #F8FAFC;
        }

        .sidebar-etudiant .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -20px;
            right: 0;
            width: 20px;
            height: 20px;
            background: transparent;
            border-top-right-radius: 20px;
            box-shadow: 10px -10px 0 10px #F8FAFC;
        }

        .navbar-etudiant {
            position: fixed;
            top: 0;
            right: 0;
            left: 280px;
            height: 80px;
            background: #F8FAFC;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
        }

        .main-content-etudiant {
            margin-left: 280px;
            margin-top: 80px;
            padding: 28px 32px;
            min-height: calc(100vh - 80px);
            animation: fadeIn 0.4s ease-out forwards;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .btn-primary:hover { background: var(--primary-dark); }
        .progress-bar { transition: width 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes softPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }

        .pulse-soft { animation: softPulse 2.2s ease-in-out infinite; }

        @media (max-width: 768px) {
            .sidebar-etudiant { transform: translateX(-100%); }
            .navbar-etudiant { left: 0; }
            .main-content-etudiant { margin-left: 0; }
        }
    </style>
</head>
<body>

<aside class="sidebar-etudiant">
    <div class="p-6 pt-8 pb-6 border-b border-white/10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-lg pulse-soft">
                <i class="fi fi-br-graduation-cap text-primary text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tight text-white">L'Erudition</h1>
                <p class="text-[11px] text-white/70 font-medium">Espace Etudiant</p>
            </div>
        </div>
    </div>

    <div class="px-4 py-5 mx-3 my-3 rounded-2xl bg-white/10 border border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-xl bg-white flex items-center justify-center shadow-md flex-shrink-0">
                <span class="text-primary font-black text-lg" th:text="${etudiant != null ? #strings.substring(etudiant.prenom, 0, 1) + #strings.substring(etudiant.nom, 0, 1) : 'E'}">N.T.</span>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-sm font-bold text-white truncate block" th:text="${etudiant != null ? etudiant.nomComplet : 'Etudiant'}">Narindra Tsiriniaina RAKOTONDRA</p>
                <p class="text-[10px] text-white/70" th:text="${etudiant != null ? etudiant.niveau : 'Debutant'}">Avancé</p>
            </div>
        </div>
    </div>

    <nav class="flex-1 px-0 py-4">
        <a href="/etudiant/dashboard" class="nav-item" th:classappend="${currentPage == 'dashboard'} ? 'active' : ''">
            <i class="fi fi-sr-dashboard"></i>
            <span>Tableau de bord</span>
        </a>
        <a href="/etudiant/mes-cours" class="nav-item" th:classappend="${currentPage == 'mes-cours'} ? 'active' : ''">
            <i class="fi fi-br-book-alt"></i>
            <span>Mes cours</span>
        </a>
        <a href="/etudiant/catalogue" class="nav-item" th:classappend="${currentPage == 'catalogue'} ? 'active' : ''">
            <i class="fi fi-br-search"></i>
            <span>Catalogue</span>
        </a>
        <a href="/etudiant/progression" class="nav-item" th:classappend="${currentPage == 'progression'} ? 'active' : ''">
            <i class="fi fi-br-chart-line"></i>
            <span>Progression</span>
        </a>
        <a href="/messages" class="nav-item" th:classappend="${currentPage == 'messages'} ? 'active' : ''">
            <i class="fi fi-br-comment-dots"></i>
            <span>Messages</span>
        </a>
        <a href="/etudiant/aide" class="nav-item" th:classappend="${currentPage == 'aide'} ? 'active' : ''">
            <i class="fi fi-br-info"></i>
            <span>Aide</span>
        </a>
        <div class="border-t border-white/10 my-4 mx-4"></div>
        <a href="/logout" class="nav-item text-rose-400 hover:text-rose-300">
            <i class="fi fi-br-exit"></i>
            <span>Deconnexion</span>
        </a>
    </nav>
</aside>

<nav class="navbar-etudiant">
    <div class="relative">
        <i class="fi fi-br-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
        <input type="text" placeholder="Rechercher un cours..." class="pl-11 pr-5 py-2.5 w-72 rounded-full border border-gray-200 bg-gray-50 text-sm focus:outline-none focus:border-secondary">
    </div>
    <div class="flex items-center gap-5">
        <button class="relative" onclick="window.location.href='/messages'">
            <i class="fi fi-br-bell text-xl text-gray-600"></i>
            <span id="globalNotificationBadge" class="absolute -top-1 -right-1 w-4 h-4 bg-secondary rounded-full text-[9px] text-white items-center justify-center font-bold" style="display: none;">0</span>
        </button>
        <div class="flex items-center gap-3 pl-4 border-l border-gray-200">
            <div class="text-right hidden sm:block">
                <p class="text-sm font-bold text-gray-800" th:text="${etudiant != null ? etudiant.nomComplet : 'Etudiant'}">Etudiant</p>
                <p class="text-[10px] text-gray-500" th:text="${etudiant != null ? etudiant.niveau : 'Debutant'}">Debutant</p>
            </div>
            <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center shadow-md pulse-soft">
                <i class="fi fi-br-user text-white text-lg"></i>
            </div>
        </div>
    </div>
</nav>

<main class="main-content-etudiant">
    <div layout:fragment="content"></div>
</main>

<div layout:fragment="modals"></div>
<div layout:fragment="script"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script th:inline="javascript">
    let globalStompClient = null;
    const layoutUserId = /*[[${etudiant != null ? etudiant.id : (professeur != null ? professeur.id : (userId != null ? userId : ''))}]]*/ '';

    if (layoutUserId) {
        const socket = new SockJS('/ws');
        globalStompClient = Stomp.over(socket);
        globalStompClient.debug = null;
        globalStompClient.connect({}, function () {
            globalStompClient.subscribe('/topic/notifications/' + layoutUserId, function () {
                const badge = document.getElementById('globalNotificationBadge');
                if (badge) {
                    let count = parseInt(badge.innerText) || 0;
                    badge.innerText = count + 1;
                    badge.style.display = 'flex';
                }
            });
        });
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Mot de passe oublié - L'Érudition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563eb',
            'primary-dark': '#1d4ed8',
            surface: {
              low: '#f8fafc',
            }
          },
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          },
          animation: {
            'slide-up': 'slideUp 0.5s ease-out forwards',
          },
          keyframes: {
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; transition: all 0.3s; }
    
    .input-animate {
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }
    .input-animate:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
      transform: scale(1.01);
    }
    .input-container:focus-within .material-symbols-outlined {
      color: #2563eb;
      transform: scale(1.1);
    }
    
    .btn-animate {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-animate:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4);
    }
    .btn-animate:active {
      transform: translateY(0) scale(0.98);
    }

    .loader {
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: none;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8">

<div class="w-full max-w-lg bg-white rounded-[2rem] shadow-2xl p-10 md:p-12 animate-slide-up relative overflow-hidden">
  
  <!-- Decorative background elements -->
  <div class="absolute -top-24 -right-24 w-48 h-48 rounded-full bg-primary/5 blur-3xl"></div>
  <div class="absolute -bottom-24 -left-24 w-48 h-48 rounded-full bg-primary/5 blur-3xl"></div>

  <div class="relative z-10">
    <!-- En-tête -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-50 text-primary rounded-full mb-6 shadow-sm">
        <span class="material-symbols-outlined text-4xl">key</span>
      </div>
      <h1 class="text-3xl font-black text-slate-800 mb-3 tracking-tight">Mot de passe oublié ?</h1>
      <p class="text-slate-500 font-medium leading-relaxed">
        Entrez votre adresse email et nous vous enverrons un lien de réinitialisation.
      </p>
    </div>

    <!-- Message succès -->
    <div th:if="${success != null}" class="mb-8 p-4 bg-emerald-50 border border-emerald-200 text-emerald-700 rounded-2xl flex items-center gap-3">
      <span class="material-symbols-outlined text-emerald-500">check_circle</span>
      <p class="text-sm font-bold" th:text="${success}"></p>
    </div>

    <!-- Message erreur -->
    <div th:if="${error != null}" class="mb-8 p-4 bg-red-50 border border-red-200 text-red-700 rounded-2xl flex items-center gap-3">
      <span class="material-symbols-outlined text-red-500">error</span>
      <p class="text-sm font-bold" th:text="${error}"></p>
    </div>

    <!-- Formulaire -->
    <form th:action="@{/forgot-password}" method="post" class="space-y-6" onsubmit="showLoader()">
      <div class="space-y-2">
        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 block px-1">Adresse Email</label>
        <div class="relative input-container">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
            <span class="material-symbols-outlined text-xl">alternate_email</span>
          </div>
          <input type="email" name="email" required
                 class="w-full pl-12 pr-4 py-4 bg-surface-low rounded-2xl text-slate-800 font-semibold outline-none input-animate"
                 placeholder="votre@email.com"/>
        </div>
      </div>

      <button type="submit" id="submitBtn"
              class="w-full py-4 bg-primary text-white text-sm font-black rounded-2xl btn-animate flex justify-center items-center gap-2 mt-4">
        <span id="btnText">ENVOYER LE LIEN</span>
        <div id="btnLoader" class="loader"></div>
      </button>
    </form>

    <!-- Retour -->
    <div class="mt-8 text-center border-t border-slate-100 pt-8">
      <a th:href="@{/login}" class="inline-flex items-center gap-2 text-slate-500 hover:text-primary font-bold transition-colors">
        <span class="material-symbols-outlined text-sm">arrow_back</span>
        Retour à la connexion
      </a>
    </div>
  </div>
</div>

<script>
  function showLoader() {
    document.getElementById('btnText').style.display = 'none';
    document.getElementById('btnLoader').style.display = 'block';
    document.getElementById('submitBtn').classList.add('opacity-90', 'cursor-not-allowed');
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Vérification | L'Érudition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .step-done { background: #10b981; color: white; }
        .step-active { background: #2563eb; color: white; }
        .line-done { background: #10b981; }
        .code-input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            outline: none;
            transition: all 0.2s;
        }
        .code-input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

    <!-- Indicateur d'étapes -->
    <div class="flex items-center justify-center mb-10">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 step-done rounded-full flex items-center justify-center font-black text-lg"></div>
            <span class="text-xs font-bold text-green-600 mt-2">Identité</span>
        </div>
        <div class="w-16 h-1 line-done mx-2"></div>
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 step-done rounded-full flex items-center justify-center font-black text-lg"></div>
            <span class="text-xs font-bold text-green-600 mt-2">Compte</span>
        </div>
        <div class="w-16 h-1 line-done mx-2"></div>
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 step-active rounded-full flex items-center justify-center font-black text-lg">3</div>
            <span class="text-xs font-bold text-blue-600 mt-2">Vérification</span>
        </div>
    </div>

    <!-- Titre -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 rounded-full mb-4">
            <span class="material-symbols-outlined text-3xl text-blue-600">mark_email_unread</span>
        </div>
        <h2 class="text-2xl font-black text-blue-600 mb-2">Vérifiez votre email</h2>
        <p class="text-gray-500 text-sm">
            Code à 6 chiffres envoyé à<br/>
            <strong class="text-blue-600" th:text="${emailMasque}">e***@email.com</strong>
        </p>
    </div>

    <!-- Message succès -->
    <div th:if="${success != null}" class="mb-6 p-4 bg-green-50 border-l-4 border-green-500 rounded-r-lg animate-pulse">
        <div class="flex items-start gap-3">
            <span class="material-symbols-outlined text-green-500">check_circle</span>
            <p class="text-sm text-green-700 font-medium" th:text="${success}"></p>
        </div>
    </div>

    <!-- Message erreur -->
    <div th:if="${error != null}" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded-r-lg">
        <div class="flex items-start gap-3">
            <span class="material-symbols-outlined text-red-500">error</span>
            <p class="text-sm text-red-700 font-medium" th:text="${error}"></p>
        </div>
    </div>

    <!-- Formulaire code -->
    <form th:action="@{/inscription/etape3}" method="post" id="codeForm">
        <div class="flex justify-center gap-2 mb-8">
            <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required/>
            <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required/>
            <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required/>
            <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required/>
            <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required/>
            <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required/>
        </div>

        <input type="hidden" name="code" id="codeComplet"/>

        <button type="submit"
                class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-xl transition-all transform active:scale-[0.98]">
            VÉRIFIER ET CRÉER MON COMPTE
        </button>
    </form>

    <!-- Renvoyer le code -->
    <div class="mt-6 text-center">
        <p class="text-gray-500 text-sm mb-2">Vous n'avez pas reçu le code ?</p>
        <form th:action="@{/inscription/renvoyer-code}" method="post" class="inline">
            <button type="submit" class="text-blue-600 font-bold hover:underline text-sm">
                Renvoyer le code
            </button>
        </form>
    </div>

    <!-- Retour -->
    <div class="mt-4 text-center">
        <a th:href="@{/inscription/etape2}" class="text-gray-400 hover:text-gray-600 text-sm">
            ← Modifier mes identifiants
        </a>
    </div>
</div>

<script>
    const inputs = document.querySelectorAll('.code-input');
    const codeComplet = document.getElementById('codeComplet');
    const codeForm = document.getElementById('codeForm');

    inputs[0].focus();

    inputs.forEach((input, index) => {
        input.addEventListener('input', function() {
            if (this.value.length === 1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
            updateCode();
        });

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
                inputs[index - 1].focus();
            }
        });

        input.addEventListener('paste', function(e) {
            e.preventDefault();
            const paste = e.clipboardData.getData('text').trim();
            if (/^\d{6}$/.test(paste)) {
                paste.split('').forEach((d, i) => inputs[i].value = d);
                updateCode();
                inputs[5].focus();
            }
        });
    });

    function updateCode() {
        codeComplet.value = Array.from(inputs).map(i => i.value).join('');
    }

    codeForm.addEventListener('submit', function(e) {
        updateCode();
        if (codeComplet.value.length !== 6) {
            e.preventDefault();
            alert('Veuillez entrer le code complet à 6 chiffres.');
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}" lang="fr">
<head>
    <title th:text="${pageTitle} ?: 'L\'Érudition - Étudiant'">L'Érudition - Étudiant</title>
</head>
<body>

<div layout:fragment="sidebar" class="sidebar-unified">
    <div class="p-6 pt-8 pb-6 border-b border-gray-100">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-primary-light rounded-xl flex items-center justify-center pulse-soft">
                <i class="fi fi-br-graduation-cap text-primary text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tight text-primary">L'Érudition</h1>
                <p class="text-[11px] text-gray-500 font-medium">Espace Étudiant</p>
            </div>
        </div>
    </div>

    <nav class="flex-1 py-4 flex flex-col">
        <a href="/etudiant/dashboard" class="nav-item" th:classappend="${currentPage == 'dashboard'} ? 'active' : ''">
            <i class="fi fi-sr-dashboard"></i>
            <span>Tableau de bord</span>
        </a>
        <a href="/etudiant/mes-cours" class="nav-item" th:classappend="${currentPage == 'mes-cours'} ? 'active' : ''">
            <i class="fi fi-br-book-alt"></i>
            <span>Mes cours</span>
        </a>
        <a href="/etudiant/catalogue" class="nav-item" th:classappend="${currentPage == 'catalogue'} ? 'active' : ''">
            <i class="fi fi-br-search"></i>
            <span>Catalogue</span>
        </a>
        <a href="/etudiant/progression" class="nav-item" th:classappend="${currentPage == 'progression'} ? 'active' : ''">
            <i class="fi fi-br-chart-line"></i>
            <span>Progression</span>
        </a>
        <a href="/messages" class="nav-item" th:classappend="${currentPage == 'messages'} ? 'active' : ''">
            <i class="fi fi-br-comment-dots"></i>
            <span>Messages</span>
        </a>
        
        <div class="mt-auto">
            <div class="border-t border-gray-100 my-4 mx-4"></div>
            <a href="/logout" class="nav-item text-red-500 hover:text-red-600 hover:bg-red-50">
                <i class="fi fi-br-exit"></i>
                <span>Déconnexion</span>
            </a>
        </div>
    </nav>
</div>

<div layout:fragment="user-profile" class="flex items-center gap-3">
    <div class="text-right hidden sm:block">
        <p class="text-sm font-bold text-gray-800" th:text="${etudiant != null ? etudiant.nomComplet : 'Étudiant'}">Étudiant</p>
        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest" th:text="${etudiant != null ? etudiant.niveau : 'Débutant'}">Débutant</p>
    </div>
    <div class="w-10 h-10 rounded-xl bg-primary-light flex items-center justify-center font-black text-primary">
        <span th:text="${etudiant != null ? #strings.substring(etudiant.prenom, 0, 1) + #strings.substring(etudiant.nom, 0, 1) : 'E'}">É</span>
    </div>
</div>

<main layout:fragment="content"></main>

</body>
</html>

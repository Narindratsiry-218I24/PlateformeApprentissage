<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{Etudiant/layout}" lang="fr">
<head>
  <title>Catalogue - L'Érudition</title>
</head>
<body>
<div layout:fragment="content">
  <div class="mb-8">
    <h1 class="text-3xl font-black text-gray-900">Catalogue des cours</h1>
    <p class="text-gray-500 mt-1">Découvrez nos formations et développez vos compétences</p>
  </div>

  <!-- Barre de recherche -->
  <div class="mb-8 max-w-md bg-white p-2 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-2">
    <form action="/etudiant/catalogue" method="get" class="flex w-full gap-2">
      <input type="text" name="keyword" th:value="${keyword}" placeholder="Rechercher un cours par titre ou description..." class="flex-1 px-4 py-2 rounded-xl border-none bg-gray-50 focus:outline-none focus:ring-2 focus:ring-primary text-sm font-medium">
      <button type="submit" class="px-5 py-2 bg-primary text-white rounded-xl hover:bg-primary-dark text-sm font-bold shadow-md shadow-primary/20">Rechercher</button>
    </form>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div th:each="c : ${cours}" class="course-card">
      <div class="h-36 bg-gray-200">
        <img th:src="${c.imageCouverture}" class="w-full h-full object-cover" th:if="${c.imageCouverture != null}">
      </div>
      <div class="p-5">
        <h3 class="font-bold text-lg text-gray-900 mb-1" th:text="${c.titre}">Titre</h3>
        <p class="text-xs text-gray-500 mb-2" th:text="${c.professeur}">Professeur</p>
        <p class="text-sm text-gray-500 line-clamp-2 mb-3" th:text="${c.descriptionCourte}">Description</p>
        <div class="flex items-center justify-between">
          <span class="text-xs text-gray-500 flex items-center gap-1"><i class="fi fi-br-time-past"></i> <span th:text="${c.dureeEstimee} + ' min'">0 min</span></span>
          <form th:action="'/etudiant/cours/' + ${c.id} + '/inscrire'" method="post">
            <button type="submit" class="px-4 py-2 bg-primary text-white rounded-xl hover:bg-primary-dark text-sm">S'inscrire</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>

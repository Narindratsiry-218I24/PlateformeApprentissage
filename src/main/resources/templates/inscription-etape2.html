<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Inscription - Étape 2 | L'Érudition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .step-active { background: #2563eb; color: white; }
    .step-done { background: #10b981; color: white; }
    .step-inactive { background: #e5e7eb; color: #9ca3af; }
    .line-done { background: #10b981; }
    .line-inactive { background: #e5e7eb; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

  <!-- Indicateur d'étapes -->
  <div class="flex items-center justify-center mb-10">
    <div class="flex flex-col items-center">
      <div class="w-12 h-12 step-done rounded-full flex items-center justify-center font-black text-lg"></div>
      <span class="text-xs font-bold text-green-600 mt-2">Identité</span>
    </div>
    <div class="w-16 h-1 line-done mx-2"></div>
    <div class="flex flex-col items-center">
      <div class="w-12 h-12 step-active rounded-full flex items-center justify-center font-black text-lg">2</div>
      <span class="text-xs font-bold text-blue-600 mt-2">Compte</span>
    </div>
    <div class="w-16 h-1 line-inactive mx-2"></div>
    <div class="flex flex-col items-center">
      <div class="w-12 h-12 step-inactive rounded-full flex items-center justify-center font-black text-lg">3</div>
      <span class="text-xs font-bold text-gray-400 mt-2">Vérification</span>
    </div>
  </div>

  <!-- Titre -->
  <div class="text-center mb-8">
    <h2 class="text-2xl font-black text-blue-600 mb-2">Créez votre compte</h2>
    <p class="text-gray-500 text-sm">
      Étape 2 sur 3 -
      <span class="font-bold text-blue-600" th:text="${prenom + ' ' + nom}">Prénom Nom</span>
    </p>
  </div>

  <!-- Message erreur -->
  <div th:if="${error != null}" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded-r-lg">
    <div class="flex items-start gap-3">
      <span class="material-symbols-outlined text-red-500">error</span>
      <p class="text-sm text-red-700 font-medium" th:text="${error}"></p>
    </div>
  </div>

  <!-- Formulaire Étape 2 -->
  <form th:action="@{/inscription/etape2}" method="post" class="space-y-5">

    <!-- Email -->
    <div>
      <label class="block text-sm font-bold text-gray-700 mb-2">
        <span class="material-symbols-outlined text-sm align-middle mr-1">alternate_email</span>
        Adresse Email
      </label>
      <input type="email" name="email" required
             class="w-full px-5 py-3.5 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all"
             placeholder="votre@email.com"/>
    </div>

    <!-- Nom d'utilisateur -->
    <div>
      <label class="block text-sm font-bold text-gray-700 mb-2">
        <span class="material-symbols-outlined text-sm align-middle mr-1">account_circle</span>
        Nom d'utilisateur
      </label>
      <input type="text" name="nomUtilisateur" required minlength="3"
             class="w-full px-5 py-3.5 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all"
             placeholder="jean.dupont"/>
    </div>

    <!-- Mot de passe -->
    <div>
      <label class="block text-sm font-bold text-gray-700 mb-2">
        <span class="material-symbols-outlined text-sm align-middle mr-1">lock</span>
        Mot de passe
      </label>
      <div class="relative">
        <input type="password" name="motDePasse" id="motDePasse" required minlength="6"
               class="w-full px-5 py-3.5 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-blue-500 outline-none transition-all pr-12"
               placeholder="••••••••"/>
        <button type="button" onclick="togglePassword('motDePasse')"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-600">
          <span class="material-symbols-outlined" id="iconMotDePasse">visibility</span>
        </button>
      </div>
    </div>

    <!-- Confirmation mot de passe -->
    <div>
      <label class="block text-sm font-bold text-gray-700 mb-2">
        <span class="material-symbols-outlined text-sm align-middle mr-1">lock_reset</span>
        Confirmer le mot de passe
      </label>
      <div class="relative">
        <input type="password" name="confirmMotDePasse" id="confirmMotDePasse" required minlength="6"
               class="w-full px-5 py-3.5 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-blue-500 outline-none transition-all pr-12"
               placeholder="••••••••"/>
      </div>
      <p id="matchMessage" class="text-xs mt-1"></p>
    </div>

    <!-- Boutons -->
    <div class="flex gap-3 pt-2">
      <a th:href="@{/inscription}"
         class="w-1/3 py-4 border-2 border-gray-300 text-gray-600 font-bold rounded-xl text-center hover:bg-gray-50 transition-all">
        ← Retour
      </a>
      <button type="submit"
              class="w-2/3 py-4 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-xl transition-all transform active:scale-[0.98] flex items-center justify-center gap-2">
        ÉTAPE SUIVANTE
        <span class="material-symbols-outlined">arrow_forward</span>
      </button>
    </div>
  </form>
</div>

<script>
  function togglePassword(id) {
    const input = document.getElementById(id);
    const icon = document.getElementById('iconMotDePasse');
    input.type = input.type === 'password' ? 'text' : 'password';
    icon.textContent = input.type === 'password' ? 'visibility' : 'visibility_off';
  }

  document.getElementById('confirmMotDePasse').addEventListener('keyup', function() {
    const pwd = document.getElementById('motDePasse').value;
    const confirm = this.value;
    const msg = document.getElementById('matchMessage');

    if (confirm.length === 0) {
      msg.textContent = '';
    } else if (pwd === confirm) {
      msg.textContent = ' Les mots de passe correspondent';
      msg.style.color = '#10b981';
    } else {
      msg.textContent = ' Les mots de passe ne correspondent pas';
      msg.style.color = '#ef4444';
    }
  });
</script>
</body>
</html>

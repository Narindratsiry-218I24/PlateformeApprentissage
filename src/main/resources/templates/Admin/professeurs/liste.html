<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{admin/layout}">
<head>
    <title>Gestion des Professeurs</title>
</head>
<body>
<div layout:fragment="content">
    <div th:with="currentPage='professeurs'"></div>

    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-2xl font-black text-slate-900">Professeurs</h1>
            <p class="text-slate-500 font-medium">Gérez les comptes des enseignants de la plateforme</p>
        </div>
        <button onclick="document.getElementById('modalAdd').classList.remove('hidden')" class="btn-primary flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-2xl font-bold transition-all shadow-lg shadow-indigo-200">
            <i class="fi fi-br-plus"></i>
            Ajouter un Professeur
        </button>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-slate-50 border-b border-slate-100">
                    <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-wider">Professeur</th>
                    <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-wider">Spécialité</th>
                    <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-wider">Cours</th>
                    <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-wider">Statut</th>
                    <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-wider">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
                <tr th:each="prof : ${professeurs}" class="hover:bg-slate-50/50 transition-colors">
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center text-indigo-600 font-black" th:text="${#strings.substring(prof.prenom, 0, 1)}">P</div>
                            <div>
                                <p class="text-sm font-bold text-slate-900" th:text="${prof.nomComplet}">Nom Prénom</p>
                                <p class="text-[11px] text-slate-500 font-medium" th:text="${prof.email}">email@test.com</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-sm font-bold text-slate-700" th:text="${prof.specialite}">Spécialité</td>
                    <td class="px-6 py-4">
                        <span class="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-xs font-black" th:text="${prof.nombreCours + ' cours'}">0 cours</span>
                    </td>
                    <td class="px-6 py-4">
                        <span th:if="${prof.verifie}" class="bg-emerald-100 text-emerald-600 px-3 py-1 rounded-full text-[10px] font-black uppercase">Vérifié</span>
                        <span th:unless="${prof.verifie}" class="bg-amber-100 text-amber-600 px-3 py-1 rounded-full text-[10px] font-black uppercase">En attente</span>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-2">
                            <button th:onclick="'openEditModal(' + ${prof.id} + ', \'' + ${prof.prenom} + '\', \'' + ${prof.nom} + '\', \'' + ${prof.email} + '\', \'' + ${prof.specialite} + '\', \'' + ${prof.biographie} + '\', ' + ${prof.verifie} + ')'" class="w-8 h-8 rounded-lg bg-slate-100 text-slate-600 flex items-center justify-center hover:bg-indigo-100 hover:text-indigo-600 transition-all">
                                <i class="fi fi-sr-pencil text-xs"></i>
                            </button>
                            <a th:href="@{'/admin/professeurs/supprimer/' + ${prof.id}}" onclick="return confirm('Supprimer ce professeur ?')" class="w-8 h-8 rounded-lg bg-slate-100 text-slate-600 flex items-center justify-center hover:bg-rose-100 hover:text-rose-600 transition-all">
                                <i class="fi fi-sr-trash text-xs"></i>
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div layout:fragment="modals">
    <!-- Modal Add -->
    <div id="modalAdd" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[2000] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-3xl shadow-2xl overflow-hidden scale-in-center">
            <div class="p-8 border-b border-slate-100 flex items-center justify-between">
                <h2 class="text-xl font-black text-slate-900">Nouveau Professeur</h2>
                <button onclick="document.getElementById('modalAdd').classList.add('hidden')" class="text-slate-400 hover:text-slate-600"><i class="fi fi-br-cross"></i></button>
            </div>
            <form action="/admin/professeurs/creer" method="POST" class="p-8 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-black text-slate-500 uppercase">Prénom</label>
                        <input type="text" name="prenom" required class="w-full px-5 py-3 rounded-2xl bg-slate-50 border border-slate-100 focus:outline-none focus:border-indigo-500 transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-black text-slate-500 uppercase">Nom</label>
                        <input type="text" name="nom" required class="w-full px-5 py-3 rounded-2xl bg-slate-50 border border-slate-100 focus:outline-none focus:border-indigo-500 transition-all">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase">Pseudo (Unique)</label>
                    <input type="text" name="nomUtilisateur" required class="w-full px-5 py-3 rounded-2xl bg-slate-50 border border-slate-100 focus:outline-none focus:border-indigo-500 transition-all">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase">Email</label>
                    <input type="email" name="email" required class="w-full px-5 py-3 rounded-2xl bg-slate-50 border border-slate-100 focus:outline-none focus:border-indigo-500 transition-all">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase">Mot de passe</label>
                    <input type="password" name="motDePasse" required class="w-full px-5 py-3 rounded-2xl bg-slate-50 border border-slate-100 focus:outline-none focus:border-indigo-500 transition-all">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase">Spécialité</label>
                    <input type="text" name="specialite" class="w-full px-5 py-3 rounded-2xl bg-slate-50 border border-slate-100 focus:outline-none focus:border-indigo-500 transition-all">
                </div>
                <div class="flex items-center gap-3">
                    <button type="submit" class="flex-1 bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-indigo-100">Enregistrer</button>
                    <button type="button" onclick="document.getElementById('modalAdd').classList.add('hidden')" class="px-8 bg-slate-100 text-slate-600 font-black py-4 rounded-2xl">Annuler</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Edit -->
    <div id="modalEdit" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[2000] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-8 border-b border-slate-100 flex items-center justify-between">
                <h2 class="text-xl font-black text-slate-900">Modifier Professeur</h2>
                <button onclick="document.getElementById('modalEdit').classList.add('hidden')" class="text-slate-400 hover:text-slate-600"><i class="fi fi-br-cross"></i></button>
            </div>
            <form id="formEdit" method="POST" class="p-8 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-black text-slate-500 uppercase">Prénom</label>
                        <input type="text" name="prenom" id="editPrenom" required class="w-full px-5 py-3 rounded-2xl bg-slate-50 border border-slate-100">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-black text-slate-500 uppercase">Nom</label>
                        <input type="text" name="nom" id="editNom" required class="w-full px-5 py-3 rounded-2xl bg-slate-50 border border-slate-100">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase">Email</label>
                    <input type="email" name="email" id="editEmail" required class="w-full px-5 py-3 rounded-2xl bg-slate-50 border border-slate-100">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase">Spécialité</label>
                    <input type="text" name="specialite" id="editSpecialite" class="w-full px-5 py-3 rounded-2xl bg-slate-50 border border-slate-100">
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" name="verifie" id="editVerifie" value="true" class="w-5 h-5 rounded-md border-slate-200 text-indigo-600 focus:ring-indigo-500">
                    <label class="text-sm font-bold text-slate-700">Compte vérifié</label>
                </div>
                <div class="flex items-center gap-3">
                    <button type="submit" class="flex-1 bg-indigo-600 text-white font-black py-4 rounded-2xl">Mettre à jour</button>
                    <button type="button" onclick="document.getElementById('modalEdit').classList.add('hidden')" class="px-8 bg-slate-100 text-slate-600 font-black py-4 rounded-2xl">Annuler</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div layout:fragment="script">
    <script>
        function openEditModal(id, prenom, nom, email, specialite, biographie, verifie) {
            document.getElementById('formEdit').action = '/admin/professeurs/modifier/' + id;
            document.getElementById('editPrenom').value = prenom;
            document.getElementById('editNom').value = nom;
            document.getElementById('editEmail').value = email;
            document.getElementById('editSpecialite').value = specialite;
            document.getElementById('editVerifie').checked = verifie;
            document.getElementById('modalEdit').classList.remove('hidden');
        }
    </script>
</div>
</body>
</html>

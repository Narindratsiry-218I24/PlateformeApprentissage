<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'L\'Erudition - Admin'">L'Erudition - Admin</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        'primary-dark': '#1d4ed8',
                        secondary: '#ca8a04',
                        accent: '#10B981'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-bold-rounded/css/uicons-bold-rounded.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-rounded/css/uicons-solid-rounded.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F8FAFC; }

        .sidebar-admin {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 280px;
            background: #FFFFFF;
            border-right: 1px solid #E2E8F0;
            z-index: 1000;
        }

        .sidebar-admin .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            margin: 4px 12px;
            border-radius: 14px;
            color: #64748B;
            font-weight: 700;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }

        .sidebar-admin .nav-item:hover {
            background: #F8FAFC;
            color: #2563eb;
            border-left-color: #2563eb;
            transform: translateX(2px);
        }

        .sidebar-admin .nav-item.active {
            background: #EEF2FF;
            color: #2563eb;
            border-left-color: #2563eb;
            box-shadow: 0 10px 18px -12px rgba(37, 99, 235, 0.35);
        }

        .navbar-admin {
            position: fixed;
            top: 0;
            right: 0;
            left: 280px;
            height: 70px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #E2E8F0;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
        }

        .main-content-admin {
            margin-left: 280px;
            margin-top: 70px;
            padding: 28px 32px;
            min-height: calc(100vh - 70px);
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .sidebar-admin { transform: translateX(-100%); }
            .navbar-admin { left: 0; }
            .main-content-admin { margin-left: 0; }
        }
    </style>
</head>
<body>

<aside class="sidebar-admin">
    <div class="p-6 pt-8 pb-6 border-b border-slate-200">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-[#2563eb] to-[#1d4ed8] rounded-xl flex items-center justify-center shadow-lg">
                <i class="fi fi-br-shield-check text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tight text-slate-900">Admin</h1>
                <p class="text-[11px] text-slate-500 font-medium">Panel de Contrôle</p>
            </div>
        </div>
    </div>

    <nav class="flex-1 px-2 py-6">
        <a href="/admin/dashboard" class="nav-item" th:classappend="${currentPage == 'dashboard'} ? 'active' : ''">
            <i class="fi fi-sr-dashboard"></i>
            <span>Dashboard</span>
        </a>
        <a href="/admin/professeurs" class="nav-item" th:classappend="${currentPage == 'professeurs'} ? 'active' : ''">
            <i class="fi fi-br-chalkboard-user"></i>
            <span>Professeurs</span>
        </a>
        <a href="/admin/etudiants" class="nav-item" th:classappend="${currentPage == 'etudiants'} ? 'active' : ''">
            <i class="fi fi-br-student"></i>
            <span>Étudiants</span>
        </a>
        <a href="/admin/suivi" class="nav-item" th:classappend="${currentPage == 'suivi'} ? 'active' : ''">
            <i class="fi fi-br-chart-line-up"></i>
            <span>Suivi Global</span>
        </a>
        <div class="border-t border-slate-200 my-4 mx-4"></div>
        <a href="/logout" class="nav-item text-rose-500 hover:text-rose-600">
            <i class="fi fi-br-exit"></i>
            <span>Déconnexion</span>
        </a>
    </nav>
</aside>

<nav class="navbar-admin">
    <div class="flex items-center gap-2">
        <h2 class="text-lg font-bold text-slate-800" th:text="${pageTitle}">Titre</h2>
    </div>
    <div class="flex items-center gap-5">
        <div class="flex items-center gap-3 pl-4 border-l border-gray-200">
            <div class="text-right hidden sm:block">
                <p class="text-sm font-bold text-gray-800">Administrateur</p>
                <p class="text-[10px] text-accent font-bold uppercase tracking-wider">Super User</p>
            </div>
            <div class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center border border-slate-200">
                <i class="fi fi-sr-user text-primary"></i>
            </div>
        </div>
    </div>
</nav>

<main class="main-content-admin">
    <!-- Success/Error Alerts -->
    <div th:if="${success}" class="mb-6 p-4 bg-emerald-50 border border-emerald-200 text-emerald-700 rounded-xl flex items-center gap-3">
        <i class="fi fi-br-check-circle"></i>
        <span th:text="${success}">Succès</span>
    </div>
    <div th:if="${error}" class="mb-6 p-4 bg-rose-50 border border-rose-200 text-rose-700 rounded-xl flex items-center gap-3">
        <i class="fi fi-br-exclamation"></i>
        <span th:text="${error}">Erreur</span>
    </div>

    <div layout:fragment="content"></div>
</main>

<div layout:fragment="modals"></div>
<div layout:fragment="script"></div>

</body>
</html>

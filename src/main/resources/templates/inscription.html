<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Inscription Étudiant | L'Érudition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .step-active { background: #2563eb; color: white; }
        .step-inactive { background: #e5e7eb; color: #9ca3af; }
        .line-inactive { background: #e5e7eb; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

    <!-- Indicateur d'étapes -->
    <div class="flex items-center justify-center mb-10">
        <!-- Étape 1 -->
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 step-active rounded-full flex items-center justify-center font-black text-lg">1</div>
            <span class="text-xs font-bold text-blue-600 mt-2">Identité</span>
        </div>
        <div class="w-16 h-1 line-inactive mx-2"></div>
        <!-- Étape 2 -->
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 step-inactive rounded-full flex items-center justify-center font-black text-lg">2</div>
            <span class="text-xs font-bold text-gray-400 mt-2">Compte</span>
        </div>
        <div class="w-16 h-1 line-inactive mx-2"></div>
        <!-- Étape 3 -->
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 step-inactive rounded-full flex items-center justify-center font-black text-lg">3</div>
            <span class="text-xs font-bold text-gray-400 mt-2">Vérification</span>
        </div>
    </div>

    <!-- Titre -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 rounded-full mb-4">
            <span class="material-symbols-outlined text-3xl text-blue-600">person_add</span>
        </div>
        <h2 class="text-2xl font-black text-blue-600 mb-2">Inscription Étudiant</h2>
        <p class="text-gray-500 text-sm">Étape 1 sur 3 - Qui êtes-vous ?</p>
    </div>

    <!-- Message erreur -->
    <div th:if="${error != null}" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded-r-lg">
        <div class="flex items-start gap-3">
            <span class="material-symbols-outlined text-red-500">error</span>
            <p class="text-sm text-red-700 font-medium" th:text="${error}"></p>
        </div>
    </div>

    <!-- Formulaire Étape 1 -->
    <form th:action="@{/inscription/etape1}" method="post" class="space-y-5">

        <!-- Prénom -->
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">
                <span class="material-symbols-outlined text-sm align-middle mr-1">person</span>
                Prénom
            </label>
            <input type="text" name="prenom" required minlength="2"
                   class="w-full px-5 py-3.5 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all"
                   placeholder="Votre prénom"/>
        </div>

        <!-- Nom -->
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">
                <span class="material-symbols-outlined text-sm align-middle mr-1">badge</span>
                Nom
            </label>
            <input type="text" name="nom" required minlength="2"
                   class="w-full px-5 py-3.5 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all"
                   placeholder="Votre nom"/>
        </div>

        <!-- Bouton Suivant -->
        <button type="submit"
                class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-xl transition-all transform active:scale-[0.98] flex items-center justify-center gap-2">
            ÉTAPE SUIVANTE
            <span class="material-symbols-outlined">arrow_forward</span>
        </button>
    </form>

    <!-- Lien connexion -->
    <p class="text-center mt-6 text-gray-500 text-sm">
        Déjà un compte ?
        <a th:href="@{/login}" class="text-blue-600 font-bold hover:underline">Connectez-vous</a>
    </p>
</div>

</body>
</html>

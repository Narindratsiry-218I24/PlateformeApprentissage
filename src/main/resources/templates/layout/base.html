<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title th:text="${pageTitle} ?: 'EduTrack - Plateforme Éducative'">EduTrack</title>

  <!-- Tailwind CSS CDN -->
  <link th:href="@{/css/tailwind.min.css}" rel="stylesheet">

  <!-- Font Awesome -->
  <link th:href="@{/css/all.min.css}" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- SockJS and STOMP for WebSocket -->
  <script th:src="@{/js/sockjs.min.js}"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

  <!-- Custom CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .transition-all {
      transition: all 0.3s ease;
    }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-gray-100">
<!-- Navigation Bar -->
<nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
  <div class="px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16">
      <!-- Logo -->
      <div class="flex items-center">
        <a th:href="@{/professeur/dashboard}" class="flex items-center gap-2">
          <i class="fas fa-chalkboard-user text-2xl text-blue-600"></i>
          <span class="text-xl font-bold text-gray-900">EduTrack</span>
          <span class="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full ml-2">Prof</span>
        </a>
      </div>

      <!-- Desktop Menu -->
      <div class="hidden md:flex items-center space-x-4">
        <a th:href="@{/professeur/dashboard}"
           class="px-3 py-2 rounded-md text-sm font-medium transition-colors"
           th:classappend="${currentPage == 'dashboard'} ? 'bg-blue-50 text-blue-600' : 'text-gray-700 hover:bg-gray-50'">
          <i class="fas fa-tachometer-alt mr-2"></i>Tableau de bord
        </a>
        <a th:href="@{/professeur/cours}"
           class="px-3 py-2 rounded-md text-sm font-medium transition-colors"
           th:classappend="${currentPage == 'cours' or currentPage == 'ajouter-cours'} ? 'bg-blue-50 text-blue-600' : 'text-gray-700 hover:bg-gray-50'">
          <i class="fas fa-book-open mr-2"></i>Mes cours
        </a>
        <a th:href="@{/professeur/etudiants}"
           class="px-3 py-2 rounded-md text-sm font-medium transition-colors"
           th:classappend="${currentPage == 'etudiants'} ? 'bg-blue-50 text-blue-600' : 'text-gray-700 hover:bg-gray-50'">
          <i class="fas fa-users mr-2"></i>Étudiants
        </a>
      </div>

      <!-- Right Section -->
      <div class="flex items-center gap-4">
        <!-- Notifications -->
        <div class="relative">
          <a th:href="@{/professeur/alertes}" class="p-2 rounded-lg hover:bg-gray-100 relative inline-block">
            <i class="fas fa-bell text-gray-600 text-xl"></i>
            <span th:if="${notificationsCount != null and notificationsCount > 0}"
                  class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full"></span>
          </a>
        </div>

        <!-- Messages with Badge -->
        <div class="relative">
          <a th:href="@{/professeur/messages}" class="p-2 rounded-lg hover:bg-gray-100 relative inline-block">
            <i class="fas fa-envelope text-gray-600 text-xl"></i>
            <span id="messagesUnreadBadge"
                  th:if="${unreadMessagesCount != null and unreadMessagesCount > 0}"
                  class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">
              <span th:text="${unreadMessagesCount}">0</span>
            </span>
          </a>
        </div>

        <!-- User Menu -->
        <div class="relative group">
          <button class="flex items-center gap-2 p-2 rounded-lg hover:bg-gray-100 transition-colors">
            <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center">
              <i class="fas fa-user-graduate text-blue-600"></i>
            </div>
            <span class="text-sm font-medium text-gray-700" th:text="${professeur.prenom} + ' ' + ${professeur.nom}">Professeur</span>
            <i class="fas fa-chevron-down text-xs text-gray-500"></i>
          </button>
          <div class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50">
            <a th:href="@{/professeur/profil}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
              <i class="fas fa-user mr-2"></i>Mon profil
            </a>
            <div class="border-t border-gray-200"></div>
            <a th:href="@{/logout}" class="block px-4 py-2 text-sm text-red-600 hover:bg-gray-100">
              <i class="fas fa-sign-out-alt mr-2"></i>Déconnexion
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- Main Content -->
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <div layout:fragment="content">
    <!-- Page content will be injected here -->
  </div>
</main>

<!-- Custom JavaScript -->
<script th:src="@{/js/professeur.js}"></script>

<!-- Page specific scripts -->
<th:block layout:fragment="scripts"></th:block>
</body>
</html>

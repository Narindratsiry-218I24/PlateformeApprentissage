<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'L\'Érudition - Apprentissage'">L'Érudition</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#003178',
                        'primary-light': '#E8F0FE',
                        'primary-dark': '#002255',
                        secondary: '#1B2559',
                        accent: '#10B981',
                        'text-main': '#1E293B',
                        'text-muted': '#64748B',
                        'border-color': '#E2E8F0'
                    },
                    boxShadow: {
                        'soft': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                        'hover': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-bold-rounded/css/uicons-bold-rounded.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-rounded/css/uicons-solid-rounded.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        /* Fallback CSS variables in case Tailwind config fails */
        :root {
            --color-primary: #1A73E8;
            --color-primary-light: #E8F0FE;
            --color-primary-dark: #1557B0;
            --color-secondary: #F8FAFC;
            --color-accent: #10B981;
            --color-text-main: #1E293B;
            --color-text-muted: #64748B;
            --color-border: #E2E8F0;
            --color-bg: #F5F7FA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--color-bg); 
            color: var(--color-text-main);
        }

        /* Fallback classes */
        body {
            background-color: #F4F7FE;
            color: #1B2559;
        }
        .text-[#003178] { color: #003178; }
        .bg-[#003178] { background-color: #003178; }
        .text-secondary { color: #1B2559; }
        .bg-secondary { background-color: #1B2559; }
        .text-muted { color: #64748B; }
        .bg-muted { background-color: #64748B; }

        .sidebar-unified {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 280px;
            background: #FFFFFF;
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-unified .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            margin: 4px 16px;
            border-radius: 12px;
            color: var(--text-muted);
            font-weight: 500;
            transition: all 0.2s ease;
            position: relative;
        }

        .sidebar-unified .nav-item:hover {
            color: var(--primary);
            background: var(--primary-light);
        }

        .sidebar-unified .nav-item.active {
            color: var(--primary);
            background: var(--primary-light);
            font-weight: 600;
        }

        .navbar-unified {
            position: fixed;
            top: 0;
            right: 0;
            left: 280px;
            height: 72px;
            background: #FFFFFF;
            border-bottom: 1px solid var(--border-color);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
        }

        .main-content-unified {
            margin-left: 280px;
            padding: 104px 32px 32px;
            min-height: 100vh;
        }

        .card-unified {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border-color);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card-unified:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        @media (max-width: 1024px) {
            .navbar-unified { left: 0; }
            .sidebar-unified { transform: translateX(-100%); }
            .main-content-unified { margin-left: 0; }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideUpBounce {
            0% { opacity: 0; transform: translateY(30px); }
            60% { opacity: 1; transform: translateY(-5px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        .animate-slide-in-right { animation: slideInRight 0.4s ease-out forwards; }
        .animate-slide-up-bounce { animation: slideUpBounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>

<!-- Layout placeholder for role specific sidebar -->
<div layout:fragment="sidebar"></div>

<!-- Unified Navbar -->
<nav class="navbar-unified">
    <!-- Left: Search (optional) -->
    <div class="flex items-center">
        <div class="relative hidden md:block">
            <i class="fi fi-br-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" placeholder="Rechercher..." class="bg-gray-50 border border-gray-200 rounded-full py-2 pl-10 pr-4 w-64 focus:outline-none focus:border-blue-600 focus:bg-white transition-colors text-sm">
        </div>
    </div>
    
    <!-- Right: User Menu -->
    <div class="flex items-center gap-6">
        <button class="relative text-gray-500 hover:text-[#003178] transition-colors" onclick="window.location.href='/messages'">
            <i class="fi fi-br-bell text-xl"></i>
            <span id="globalNotificationBadge" class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-[10px] text-white flex items-center justify-center font-bold" style="display: none;">0</span>
        </button>
        
        <div class="h-8 w-px bg-gray-200"></div>
        
        <div layout:fragment="user-profile" class="flex items-center gap-3 cursor-pointer">
            <!-- Will be injected by Etudiant/Professeur layout -->
        </div>
    </div>
</nav>

<main class="main-content-unified">
    <div layout:fragment="content"></div>
</main>

<div layout:fragment="modals"></div>
<script layout:fragment="script"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script th:inline="javascript">
    let globalStompClient = null;
    const layoutUserId = /*[[${session.userId}]]*/ null;
    
    if (layoutUserId) {
        const socket = new SockJS('/ws');
        globalStompClient = Stomp.over(socket);
        globalStompClient.debug = null;
        globalStompClient.connect({}, function () {
            globalStompClient.subscribe('/topic/notifications/' + layoutUserId, function () {
                const badge = document.getElementById('globalNotificationBadge');
                if (badge) {
                    let count = parseInt(badge.innerText) || 0;
                    badge.innerText = count + 1;
                    badge.style.display = 'flex';
                }
            });
        });
    }
</script>

</body>
</html>

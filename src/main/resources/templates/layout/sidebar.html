<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div id="sidebar" class="sidebar">
    <div class="sidebar-header">
        <div class="flex items-center gap-3">
            <div class="sidebar-logo">
                <i class="fas fa-chalkboard-user"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold">EduTrack</h1>
                <p class="text-xs text-white/60">Espace Professeur</p>
            </div>
        </div>
    </div>

    <nav class="flex-1">
        <div class="space-y-1">
            <a th:href="@{/professeur/dashboard}"
               class="nav-item"
               th:classappend="${currentPage == 'dashboard'} ? 'active' : ''">
                <i class="fas fa-chart-line"></i>
                <span class="sidebar-text">Tableau de bord</span>
            </a>

            <a th:href="@{/professeur/cours}"
               class="nav-item"
               th:classappend="${currentPage == 'cours'} ? 'active' : ''">
                <i class="fas fa-book-open"></i>
                <span class="sidebar-text">Mes cours</span>
            </a>

            <a th:href="@{/professeur/cours/ajouter}"
               class="nav-item"
               th:classappend="${currentPage == 'ajouter-cours'} ? 'active' : ''">
                <i class="fas fa-plus-circle"></i>
                <span class="sidebar-text">Créer un cours</span>
            </a>

            <a th:href="@{/professeur/etudiants}"
               class="nav-item"
               th:classappend="${currentPage == 'etudiants'} ? 'active' : ''">
                <i class="fas fa-users"></i>
                <span class="sidebar-text">Étudiants</span>
            </a>

            <a th:href="@{/professeur/messages}"
               class="nav-item"
               th:classappend="${currentPage == 'messages'} ? 'active' : ''">
                <i class="fas fa-envelope"></i>
                <span class="sidebar-text">Messages</span>
                <span th:if="${unreadMessagesCount != null and unreadMessagesCount > 0}"
                      class="nav-badge"
                      th:text="${unreadMessagesCount}">0</span>
            </a>

            <a th:href="@{/professeur/statistiques}"
               class="nav-item"
               th:classappend="${currentPage == 'statistiques'} ? 'active' : ''">
                <i class="fas fa-chart-simple"></i>
                <span class="sidebar-text">Statistiques</span>
            </a>
        </div>
    </nav>

    <div class="p-6 border-t border-white/10 mt-auto">
        <a th:href="@{/professeur/profil}" class="nav-item">
            <i class="fas fa-user-circle"></i>
            <span class="sidebar-text">Mon profil</span>
        </a>
        <a th:href="@{/logout}" class="nav-item">
            <i class="fas fa-sign-out-alt"></i>
            <span class="sidebar-text">Déconnexion</span>
        </a>
    </div>

    <button id="toggleSidebar" class="sidebar-toggle hidden md:flex">
        <i class="fas fa-chevron-left"></i>
    </button>
</div>

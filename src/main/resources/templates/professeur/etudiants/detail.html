<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{professeur/layout}" lang="fr">
<head>
    <title th:text="${etudiant.nomComplet} + ' - Détail étudiant'">Détail étudiant</title>
</head>
<body>
<div layout:fragment="content">
    <div class="mb-8">
        <a href="/professeur/etudiants" class="inline-flex items-center gap-2 text-gray-500 hover:text-primary mb-4 transition-colors">
            <i class="fi fi-br-arrow-left text-sm"></i>
            <span class="text-sm">Retour à la liste</span>
        </a>
        <div class="flex flex-col md:flex-row justify-between items-start gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-black text-gray-900" th:text="${etudiant.nomComplet}">Nom Étudiant</h1>
                <p class="text-gray-500 mt-1" th:text="${etudiant.email}">email@example.com</p>
            </div>
            <div class="flex gap-3">
                <div class="bg-white rounded-xl px-5 py-3 shadow-sm text-center"><p class="text-xs text-gray-500">Progression moyenne</p><p class="text-2xl font-bold text-primary" th:text="${statistiques.progressionMoyenne} + '%'">0%</p></div>
                <div class="bg-white rounded-xl px-5 py-3 shadow-sm text-center"><p class="text-xs text-gray-500">Cours suivis</p><p class="text-2xl font-bold text-primary" th:text="${statistiques.totalCours}">0</p></div>
                <div class="bg-white rounded-xl px-5 py-3 shadow-sm text-center"><p class="text-xs text-gray-500">Heures étudiées</p><p class="text-2xl font-bold text-primary" th:text="${statistiques.totalHeures}">0</p></div>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100"><h2 class="text-lg font-bold text-gray-900">Progression par cours</h2><p class="text-sm text-gray-500">Détail de l'avancement dans chaque formation</p></div>
        <div th:if="${not #lists.isEmpty(progressionCours)}" class="divide-y divide-gray-100">
            <div th:each="c : ${progressionCours}" class="p-6 hover:bg-gray-50 transition-colors">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div class="flex-1"><div class="flex items-center gap-3"><div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center"><i class="fi fi-br-book text-primary text-xl"></i></div><div><h3 class="font-bold text-gray-900" th:text="${c.coursTitre}">Titre</h3><p class="text-sm text-gray-500" th:text="${c.coursDescriptionCourte}">Description</p></div></div></div>
                    <div class="w-full md:w-64"><div class="flex justify-between text-sm text-gray-600 mb-1"><span>Progression</span><span th:text="${c.progression} + '%'">0%</span></div><div class="w-full bg-gray-200 rounded-full h-2"><div class="progress-bar bg-primary h-2 rounded-full" th:style="'width:' + ${c.progression} + '%'"></div></div><div class="flex justify-between text-xs text-gray-400 mt-1"><span th:text="${c.contenusCompletes} + ' / ' + ${c.contenusTotal} + ' contenus'">0/0</span><span th:if="${c.estTermine}" class="text-accent"><i class="fi fi-br-check-circle"></i> Terminé</span></div></div>
                    <div><a th:href="'/professeur/cours/' + ${c.coursId} + '/gerer'" class="text-primary text-sm font-semibold hover:underline flex items-center gap-1">Voir le cours <i class="fi fi-br-arrow-right text-xs"></i></a></div>
                </div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(progressionCours)}" class="p-12 text-center text-gray-400"><i class="fi fi-br-book-alt text-4xl mb-2 block"></i><p>Cet étudiant n'est inscrit à aucun de vos cours</p></div>
    </div>
</div>
</body>
</html>

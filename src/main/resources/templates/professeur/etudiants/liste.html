<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{professeur/layout}" lang="fr">
<head>
    <title>Suivi étudiants - L'Érudition</title>
</head>
<body>
<div layout:fragment="content" class="animate-fade">
    <div class="mb-10">
        <h1 class="text-4xl font-black text-secondary">Suivi des étudiants</h1>
        <p class="text-muted font-medium mt-1">Analysez l'engagement et la progression de vos apprenants</p>
    </div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
        <div class="card-premium flex items-center gap-5">
            <div class="stat-icon bg-blue-100 text-blue-600">
                <i class="fi fi-br-users-alt"></i>
            </div>
            <div>
                <p class="text-muted text-[10px] font-bold uppercase tracking-wider">Total Étudiants</p>
                <p class="text-2xl font-black text-secondary" th:text="${etudiants != null ? etudiants.size() : 0}">0</p>
            </div>
        </div>
        <div class="card-premium flex items-center gap-5">
            <div class="stat-icon bg-accent/10 text-accent">
                <i class="fi fi-br-chart-line"></i>
            </div>
            <div>
                <p class="text-muted text-[10px] font-bold uppercase tracking-wider">Progression Moy.</p>
                <p class="text-2xl font-black text-secondary" id="avgProgression">0%</p>
            </div>
        </div>
        <div class="card-premium flex items-center gap-5">
            <div class="stat-icon bg-primary/10 text-primary">
                <i class="fi fi-br-book-alt"></i>
            </div>
            <div>
                <p class="text-muted text-[10px] font-bold uppercase tracking-wider">Cours Actifs</p>
                <p class="text-2xl font-black text-secondary" th:text="${coursList != null ? coursList.size() : 0}">0</p>
            </div>
        </div>
        <div class="card-premium flex items-center gap-5">
            <div class="stat-icon bg-orange-100 text-orange-500">
                <i class="fi fi-br-time-past"></i>
            </div>
            <div>
                <p class="text-muted text-[10px] font-bold uppercase tracking-wider">Actifs / 7j</p>
                <p class="text-2xl font-black text-secondary" id="activeCount">0</p>
            </div>
        </div>
    </div>

    <div class="card-premium !p-0 overflow-hidden">
        <div class="px-8 py-6 border-b border-border-color flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-gray-50/30">
            <h2 class="text-xl font-bold text-secondary">Liste des apprenants</h2>
            <div class="flex flex-wrap gap-3 w-full md:w-auto">
                <div class="relative flex-1 md:flex-none">
                    <i class="fi fi-br-search absolute left-4 top-1/2 -translate-y-1/2 text-muted text-sm"></i>
                    <input type="text" id="searchInput" placeholder="Rechercher un nom..." class="w-full pl-11 pr-4 py-2.5 bg-white border border-border-color rounded-xl text-sm focus:outline-none focus:border-primary">
                </div>
                <select id="filterProgression" class="bg-white border border-border-color rounded-xl px-4 py-2.5 text-sm font-bold text-secondary focus:outline-none focus:border-primary">
                    <option value="">Tous les niveaux</option>
                    <option value="high">Excellente (≥75%)</option>
                    <option value="medium">Moyenne (50-74%)</option>
                    <option value="low">À risque (<50%)</option>
                </select>
            </div>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead>
                    <tr class="text-left bg-gray-50/50">
                        <th class="px-8 py-4 text-[10px] font-black uppercase tracking-widest text-muted">Étudiant</th>
                        <th class="px-8 py-4 text-[10px] font-black uppercase tracking-widest text-muted">Contact</th>
                        <th class="px-8 py-4 text-[10px] font-black uppercase tracking-widest text-muted text-center">Cours</th>
                        <th class="px-8 py-4 text-[10px] font-black uppercase tracking-widest text-muted">Progression</th>
                        <th class="px-8 py-4 text-[10px] font-black uppercase tracking-widest text-muted text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody" class="divide-y divide-border-color">
                    <tr th:each="e : ${etudiants}" class="student-row hover:bg-primary/5 transition-colors" th:data-progression="${e.progressionMoyenne}">
                        <td class="px-8 py-5">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-primary-dark flex items-center justify-center text-white font-bold text-sm shadow-sm">
                                    <span th:text="${#strings.substring(e.nomComplet,0,1)}">E</span>
                                </div>
                                <span class="font-bold text-secondary" th:text="${e.nomComplet}">Nom</span>
                            </div>
                        </td>
                        <td class="px-8 py-5 text-sm text-muted font-medium" th:text="${e.email}">email@example.com</td>
                        <td class="px-8 py-5 text-center">
                            <span class="px-3 py-1 bg-primary/5 text-primary rounded-full text-[10px] font-black uppercase" th:text="${e.nombreCours} + ' cours'">0</span>
                        </td>
                        <td class="px-8 py-5">
                            <div class="flex items-center gap-4">
                                <div class="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
                                    <div class="h-full rounded-full transition-all duration-1000 shadow-sm" 
                                         th:classappend="${e.progressionMoyenne >= 75 ? 'bg-accent' : (e.progressionMoyenne >= 50 ? 'bg-primary' : 'bg-red-400')}" 
                                         th:style="'width:' + ${e.progressionMoyenne} + '%'"></div>
                                </div>
                                <span class="text-xs font-black text-secondary" th:text="${e.progressionMoyenne} + '%'">0%</span>
                            </div>
                        </td>
                        <td class="px-8 py-5 text-center">
                            <a th:href="'/professeur/etudiants/' + ${e.id}" class="w-10 h-10 inline-flex items-center justify-center bg-white border border-border-color rounded-xl text-muted hover:text-primary hover:border-primary transition-all">
                                <i class="fi fi-br-eye"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(etudiants)}">
                        <td colspan="5" class="px-8 py-20 text-center">
                            <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4 text-muted opacity-20">
                                <i class="fi fi-br-users-alt text-3xl"></i>
                            </div>
                            <p class="font-bold text-muted">Aucun étudiant inscrit à vos cours</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script layout:fragment="script" th:inline="javascript">
    const etudiantsData = /*[[${etudiants}]]*/ [];
    
    function updateStats() {
        if(etudiantsData && etudiantsData.length) {
            let total = 0, active = 0, now = new Date(), sevenDaysAgo = new Date(now - 7*24*60*60*1000);
            for(let e of etudiantsData) {
                total += e.progressionMoyenne || 0;
                if(e.derniereActivite && new Date(e.derniereActivite) >= sevenDaysAgo) active++;
            }
            $('#avgProgression').text(Math.round(total/etudiantsData.length) + '%');
            $('#activeCount').text(active);
        }
    }

    $('#filterProgression').on('change', function() {
        let filter = $(this).val();
        $('.student-row').each(function() {
            let p = parseInt($(this).data('progression'));
            let show = true;
            if(filter === 'high' && p < 75) show = false;
            if(filter === 'medium' && (p < 50 || p >= 75)) show = false;
            if(filter === 'low' && p >= 50) show = false;
            $(this).toggle(show);
        });
    });

    $('#searchInput').on('input', function() {
        let val = $(this).val().toLowerCase();
        $('.student-row').each(function() {
            let name = $(this).find('.font-bold').text().toLowerCase();
            $(this).toggle(name.includes(val));
        });
    });

    $(document).ready(updateStats);
</script>
</body>
</html>

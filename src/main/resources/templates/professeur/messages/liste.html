<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base.html}">
<head>
    <title>Messages - Professeur</title>
    <!-- SockJS and STOMP -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        .message-container { height: calc(100vh - 280px); min-height: 400px; }
        .message-list { height: 100%; overflow-y: auto; }
        .chat-area { height: 100%; display: flex; flex-direction: column; }
        .messages-scroll { flex: 1; overflow-y: auto; padding: 1rem; }
        .message-bubble { max-width: 70%; margin-bottom: 1rem; }
        .message-sent { margin-left: auto; }
        .message-sent .message-bubble { background: #3b82f6; color: white; border-radius: 1rem 1rem 0 1rem; }
        .message-received .message-bubble { background: #f3f4f6; color: #1f2937; border-radius: 1rem 1rem 1rem 0; }
        .conversation-item.active { background: #eff6ff; border-left: 4px solid #3b82f6; }
        .unread-badge { background: #ef4444; color: white; border-radius: 9999px; padding: 0.125rem 0.5rem; font-size: 0.75rem; }
        .typing-indicator { display: inline-block; padding: 0.5rem 1rem; background: #f3f4f6; border-radius: 1rem; font-size: 0.875rem; color: #6b7280; }
        .typing-dot { display: inline-block; width: 4px; height: 4px; border-radius: 50%; background: #9ca3af; margin: 0 1px; animation: typing 1.4s infinite; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }
    </style>
</head>
<div layout:fragment="content">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Messages</h1>
        <p class="text-gray-600">Discutez avec vos étudiants</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="grid grid-cols-1 md:grid-cols-3 h-[calc(100vh-200px)] min-h-[500px]">
            <!-- Conversations List -->
            <div class="border-r border-gray-200">
                <div class="p-4 border-b border-gray-200 bg-gray-50">
                    <h3 class="font-semibold text-gray-900">Conversations</h3>
                    <p class="text-sm text-gray-500" id="conversationCount">0 conversation</p>
                </div>
                <div id="conversationsList" class="overflow-y-auto h-[calc(100%-70px)]">
                    <!-- Conversations will be loaded here -->
                    <div class="text-center py-8 text-gray-500">
                        <i class="fas fa-comments text-4xl mb-2"></i>
                        <p>Aucune conversation</p>
                    </div>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="col-span-2 flex flex-col">
                <div id="chatHeader" class="p-4 border-b border-gray-200 bg-gray-50 hidden">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">
                            <i class="fas fa-user-graduate text-blue-600"></i>
                        </div>
                        <div>
                            <h3 id="chatUserName" class="font-semibold text-gray-900">-</h3>
                            <p id="chatUserRole" class="text-xs text-gray-500">-</p>
                        </div>
                    </div>
                </div>

                <div id="chatMessages" class="messages-scroll flex-1 p-4 space-y-3 overflow-y-auto">
                    <div class="text-center py-12 text-gray-500">
                        <i class="fas fa-inbox text-4xl mb-2"></i>
                        <p>Sélectionnez une conversation pour commencer</p>
                    </div>
                </div>

                <div id="typingIndicator" class="px-4 py-2 hidden">
                    <div class="typing-indicator">
                        <span>En train d'écrire</span>
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                    </div>
                </div>

                <div id="messageInput" class="p-4 border-t border-gray-200 bg-white hidden">
                    <div class="flex gap-2">
                        <div class="flex-1 relative">
                            <textarea id="messageText" rows="2"
                                      class="w-full px-4 py-2 border border-gray-300 rounded-lg resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
                                      placeholder="Écrivez votre message..."></textarea>
                            <div class="absolute bottom-2 right-2 text-xs text-gray-400">
                                <span id="charCount">0</span>/500
                            </div>
                        </div>
                        <div class="flex flex-col gap-2">
                            <button id="sendBtn"
                                    class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                            <button id="attachBtn"
                                    class="bg-gray-100 text-gray-600 px-4 py-2 rounded-lg hover:bg-gray-200 transition-colors">
                                <i class="fas fa-paperclip"></i>
                            </button>
                        </div>
                    </div>
                    <input type="file" id="fileInput" class="hidden">
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script>
        // ============================================
        // WebSocket Configuration
        // ============================================
        let stompClient = null;
        let currentConversationId = null;
        let currentReceiverId = null;
        let currentReceiverName = null;
        let typingTimeout = null;
        let isTyping = false;

        // Current user info (from server)
        const currentUser = {
            id: 'prof_1',
            name: 'Prof. Martin Dupont',
            role: 'PROFESSEUR'
        };

        // Mock students list (would come from server)
        const students = [
            { id: 'etu_1', name: 'Sophie Martin', role: 'ETUDIANT', class: 'Terminale S' },
            { id: 'etu_2', name: 'Thomas Bernard', role: 'ETUDIANT', class: 'Première' },
            { id: 'etu_3', name: 'Emma Dubois', role: 'ETUDIANT', class: 'Terminale ES' },
            { id: 'etu_4', name: 'Lucas Petit', role: 'ETUDIANT', class: 'Seconde' }
        ];

        // Conversations data
        let conversations = [];
        let messages = [];

        // ============================================
        // Initialize WebSocket Connection
        // ============================================
        function connectWebSocket() {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);

            stompClient.connect({}, function(frame) {
                console.log('Connected: ' + frame);

                // Subscribe to user-specific queue
                stompClient.subscribe('/user/queue/messages', function(message) {
                    const receivedMessage = JSON.parse(message.body);
                    handleNewMessage(receivedMessage);
                });

                // Subscribe to typing notifications
                stompClient.subscribe('/topic/typing', function(message) {
                    const data = JSON.parse(message.body);
                    if (data.senderId !== currentUser.id && data.conversationId === currentConversationId) {
                        showTypingIndicator(data.senderName);
                    }
                });

            }, function(error) {
                console.error('WebSocket connection error:', error);
                setTimeout(connectWebSocket, 5000);
            });
        }

        // ============================================
        // Send Message via WebSocket
        // ============================================
        function sendMessage(content) {
            if (!content.trim() || !currentReceiverId) return;

            const message = {
                id: null,
                content: content,
                senderId: currentUser.id,
                senderName: currentUser.name,
                senderRole: currentUser.role,
                receiverId: currentReceiverId,
                receiverName: currentReceiverName,
                conversationId: currentConversationId,
                timestamp: new Date(),
                read: false,
                type: 'TEXT'
            };

            stompClient.send("/app/chat.send", {}, JSON.stringify(message));

            // Add message locally
            addMessageToChat(message);

            // Clear input
            document.getElementById('messageText').value = '';
            document.getElementById('charCount').innerText = '0';
        }

        // ============================================
        // Send Typing Indicator
        // ============================================
        function sendTypingIndicator() {
            if (!currentReceiverId) return;

            if (typingTimeout) clearTimeout(typingTimeout);

            if (!isTyping) {
                isTyping = true;
                stompClient.send("/app/typing", {}, JSON.stringify({
                    senderId: currentUser.id,
                    senderName: currentUser.name,
                    receiverId: currentReceiverId,
                    conversationId: currentConversationId
                }));
            }

            typingTimeout = setTimeout(() => {
                isTyping = false;
            }, 3000);
        }

        // ============================================
        // Handle New Message
        // ============================================
        function handleNewMessage(message) {
            // Update conversation list
            updateConversationList(message);

            // If this is the current conversation, add message to chat
            if (message.conversationId === currentConversationId) {
                addMessageToChat(message);
            } else {
                // Show notification
                showNotification(message);
            }

            // Update unread count in sidebar
            updateUnreadCount();
        }

        // ============================================
        // Add Message to Chat UI
        // ============================================
        function addMessageToChat(message) {
            const isSent = message.senderId === currentUser.id;
            const time = new Date(message.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            const messageHtml = `
            <div class="flex ${isSent ? 'justify-end' : 'justify-start'} message-${isSent ? 'sent' : 'received'}">
                <div class="message-bubble max-w-[70%] p-3">
                    <p class="text-sm">${escapeHtml(message.content)}</p>
                    <div class="text-xs ${isSent ? 'text-blue-200' : 'text-gray-400'} mt-1 flex items-center gap-1">
                        <span>${time}</span>
                        ${isSent && message.read ? '<i class="fas fa-check-double text-xs"></i>' : ''}
                    </div>
                </div>
            </div>
        `;

            const container = document.getElementById('chatMessages');
            container.insertAdjacentHTML('beforeend', messageHtml);
            container.scrollTop = container.scrollHeight;
        }

        // ============================================
        // Load Conversation
        // ============================================
        function loadConversation(studentId, studentName) {
            currentReceiverId = studentId;
            currentReceiverName = studentName;
            currentConversationId = [currentUser.id, studentId].sort().join('_');

            // Update header
            document.getElementById('chatUserName').innerText = studentName;
            const student = students.find(s => s.id === studentId);
            document.getElementById('chatUserRole').innerHTML = `<i class="fas fa-graduation-cap mr-1"></i>${student ? student.class : 'Étudiant'}`;

            // Show chat area
            document.getElementById('chatHeader').classList.remove('hidden');
            document.getElementById('messageInput').classList.remove('hidden');

            // Clear messages
            document.getElementById('chatMessages').innerHTML = '<div class="text-center py-8"><div class="spinner"></div><p class="text-gray-500 mt-2">Chargement...</p></div>';

            // Load messages from server
            fetch(`/professeur/messages/${studentId}`)
                .then(res => res.json())
                .then(data => {
                    messages = data;
                    renderMessages();
                })
                .catch(err => console.error('Error loading messages:', err));

            // Mark conversation as active in list
            document.querySelectorAll('.conversation-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.userId === studentId) {
                    item.classList.add('active');
                }
            });
        }

        // ============================================
        // Render Messages
        // ============================================
        function renderMessages() {
            const container = document.getElementById('chatMessages');
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="text-center py-12 text-gray-500"><i class="fas fa-comment-dots text-4xl mb-2"></i><p>Aucun message. Commencez la conversation !</p></div>';
                return;
            }

            container.innerHTML = '';
            messages.forEach(message => {
                const isSent = message.senderId === currentUser.id;
                const time = new Date(message.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                const messageHtml = `
                <div class="flex ${isSent ? 'justify-end' : 'justify-start'} message-${isSent ? 'sent' : 'received'}">
                    <div class="message-bubble max-w-[70%] p-3">
                        <p class="text-sm">${escapeHtml(message.content)}</p>
                        <div class="text-xs ${isSent ? 'text-blue-200' : 'text-gray-400'} mt-1 flex items-center gap-1">
                            <span>${time}</span>
                            ${isSent && message.read ? '<i class="fas fa-check-double text-xs"></i>' : ''}
                        </div>
                    </div>
                </div>
            `;
                container.insertAdjacentHTML('beforeend', messageHtml);
            });

            container.scrollTop = container.scrollHeight;
        }

        // ============================================
        // Update Conversation List
        // ============================================
        function updateConversationList(message) {
            // Find or create conversation
            let conversation = conversations.find(c => c.id === message.conversationId);
            const otherId = message.senderId === currentUser.id ? message.receiverId : message.senderId;
            const otherName = message.senderId === currentUser.id ? message.receiverName : message.senderName;
            const otherRole = message.senderId === currentUser.id ? message.receiverRole : message.senderRole;

            if (!conversation) {
                conversation = {
                    id: message.conversationId,
                    participant1Id: currentUser.id,
                    participant1Name: currentUser.name,
                    participant1Role: currentUser.role,
                    participant2Id: otherId,
                    participant2Name: otherName,
                    participant2Role: otherRole,
                    lastMessagePreview: message.content.substring(0, 50),
                    lastMessageTime: new Date(message.timestamp),
                    unreadCount: message.senderId !== currentUser.id ? 1 : 0
                };
                conversations.unshift(conversation);
            } else {
                conversation.lastMessagePreview = message.content.substring(0, 50);
                conversation.lastMessageTime = new Date(message.timestamp);
                if (message.senderId !== currentUser.id && message.conversationId !== currentConversationId) {
                    conversation.unreadCount = (conversation.unreadCount || 0) + 1;
                }

                // Move to top
                const index = conversations.findIndex(c => c.id === conversation.id);
                if (index > -1) conversations.splice(index, 1);
                conversations.unshift(conversation);
            }

            renderConversations();
        }

        // ============================================
        // Render Conversations List
        // ============================================
        function renderConversations() {
            const container = document.getElementById('conversationsList');

            if (conversations.length === 0) {
                container.innerHTML = `
                <div class="text-center py-8 text-gray-500">
                    <i class="fas fa-comments text-4xl mb-2"></i>
                    <p>Aucune conversation</p>
                    <p class="text-sm mt-2">Commencez à discuter avec vos étudiants</p>
                </div>
            `;
                document.getElementById('conversationCount').innerText = '0 conversation';
                return;
            }

            let html = '';
            conversations.forEach(conv => {
                const otherId = conv.participant1Id === currentUser.id ? conv.participant2Id : conv.participant1Id;
                const otherName = conv.participant1Id === currentUser.id ? conv.participant2Name : conv.participant1Name;
                const time = conv.lastMessageTime ? new Date(conv.lastMessageTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
                const isActive = currentReceiverId === otherId;

                html += `
                <div class="conversation-item p-3 hover:bg-gray-50 cursor-pointer transition-colors ${isActive ? 'active' : ''}"
                     data-user-id="${otherId}"
                     onclick="loadConversation('${otherId}', '${otherName.replace(/'/g, "\\'")}')">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center flex-shrink-0">
                            <i class="fas fa-user-graduate text-blue-600"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-baseline">
                                <p class="font-medium text-gray-900 truncate">${escapeHtml(otherName)}</p>
                                <span class="text-xs text-gray-400">${time}</span>
                            </div>
                            <p class="text-sm text-gray-500 truncate">${escapeHtml(conv.lastMessagePreview || 'Nouvelle conversation')}</p>
                        </div>
                        ${conv.unreadCount > 0 ? `<div class="unread-badge">${conv.unreadCount}</div>` : ''}
                    </div>
                </div>
            `;
            });

            container.innerHTML = html;
            document.getElementById('conversationCount').innerText = conversations.length + ' conversation' + (conversations.length > 1 ? 's' : '');
        }

        // ============================================
        // Show Notification
        // ============================================
        function showNotification(message) {
            // Browser notification if permitted
            if (Notification.permission === 'granted') {
                new Notification('Nouveau message', {
                    body: `${message.senderName}: ${message.content.substring(0, 50)}`,
                    icon: '/favicon.ico'
                });
            }

            // Also show a toast
            showToast(`📩 ${message.senderName}: ${message.content.substring(0, 30)}...`, 'info');

            // Update sidebar unread badge
            updateUnreadCount();
        }

        // ============================================
        // Update Unread Count in Navbar
        // ============================================
        function updateUnreadCount() {
            const totalUnread = conversations.reduce((sum, conv) => sum + (conv.unreadCount || 0), 0);
            const badge = document.querySelector('.notification-badge .unread-count');
            if (badge) {
                if (totalUnread > 0) {
                    badge.textContent = totalUnread > 9 ? '9+' : totalUnread;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            }
        }

        // ============================================
        // Show Typing Indicator
        // ============================================
        function showTypingIndicator(userName) {
            const indicator = document.getElementById('typingIndicator');
            indicator.innerHTML = `<div class="typing-indicator"><span>${userName} est en train d'écrire</span><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
            indicator.classList.remove('hidden');

            setTimeout(() => {
                indicator.classList.add('hidden');
            }, 3000);
        }

        // ============================================
        // Initialize Demo Conversations
        // ============================================
        function initDemoConversations() {
            students.forEach(student => {
                const convId = [currentUser.id, student.id].sort().join('_');
                const existing = conversations.find(c => c.id === convId);

                if (!existing) {
                    conversations.push({
                        id: convId,
                        participant1Id: currentUser.id,
                        participant1Name: currentUser.name,
                        participant1Role: currentUser.role,
                        participant2Id: student.id,
                        participant2Name: student.name,
                        participant2Role: student.role,
                        lastMessagePreview: student.id === 'etu_1' ? 'Bonjour Professeur, j\'ai une question sur le cours...' : null,
                        lastMessageTime: student.id === 'etu_1' ? new Date(Date.now() - 3600000) : null,
                        unreadCount: student.id === 'etu_1' ? 1 : 0
                    });
                }
            });

            renderConversations();
            updateUnreadCount();

            // Request notification permission
            if (Notification.permission === 'default') {
                Notification.requestPermission();
            }
        }

        // ============================================
        // Event Listeners
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            connectWebSocket();
            initDemoConversations();

            const messageText = document.getElementById('messageText');
            const sendBtn = document.getElementById('sendBtn');
            const attachBtn = document.getElementById('attachBtn');
            const fileInput = document.getElementById('fileInput');

            sendBtn.addEventListener('click', () => {
                sendMessage(messageText.value);
            });

            messageText.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage(messageText.value);
                }
            });

            messageText.addEventListener('input', () => {
                document.getElementById('charCount').innerText = messageText.value.length;
                if (messageText.value.trim()) {
                    sendTypingIndicator();
                }
            });

            attachBtn.addEventListener('click', () => {
                fileInput.click();
            });

            fileInput.addEventListener('change', (e) => {
                if (e.target.files && e.target.files[0]) {
                    // Handle file upload
                    showToast('Fichier envoyé: ' + e.target.files[0].name, 'success');
                    fileInput.value = '';
                }
            });
        });

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</th:block>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'L\'Érudition - Professeur'">L'Érudition - Professeur</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--primary)',
                        'primary-dark': 'var(--primary-dark)',
                        secondary: 'var(--secondary)',
                        'secondary-light': 'var(--secondary-light)',
                        accent: 'var(--accent)',
                        'text-muted': 'var(--text-muted)',
                        'border-color': 'var(--border-color)'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-bold-rounded/css/uicons-bold-rounded.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-rounded/css/uicons-solid-rounded.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #F4F7FE; 
            color: #1B2559;
        }

        :root {
            --primary: #2563eb;
            --primary-light: #dbeafe;
            --primary-dark: #1d4ed8;
            --secondary: #ca8a04;
            --secondary-light: #fde047;
            --accent: #10b981;
            --bg-sidebar: #FFFFFF;
            --text-main: #1B2559;
            --text-muted: #A3AED0;
            --border-color: #E0E5F2;
            --shadow-soft: 0px 18px 40px rgba(112, 144, 176, 0.12);
        }

        .sidebar-prof {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 290px;
            background: var(--bg-sidebar);
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid var(--border-color);
        }

        .sidebar-prof .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 24px;
            margin: 4px 16px;
            border-radius: 16px;
            color: var(--text-muted);
            font-weight: 600;
            transition: all 0.2s ease;
            position: relative;
        }

        .sidebar-prof .nav-item:hover {
            color: var(--secondary);
            background: #F4F7FE;
        }

        .sidebar-prof .nav-item.active {
            color: var(--primary);
            background: white;
            box-shadow: var(--shadow-soft);
        }

        .sidebar-prof .nav-item.active::after {
            content: '';
            position: absolute;
            right: -16px;
            top: 10px;
            bottom: 10px;
            width: 4px;
            background: var(--primary);
            border-radius: 4px;
        }

        .sidebar-prof .nav-item i { font-size: 1.25rem; }

        .navbar-prof {
            position: fixed;
            top: 12px;
            right: 20px;
            left: 310px;
            height: 70px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-shadow: var(--shadow-soft);
        }

        .main-content-prof {
            margin-left: 290px;
            padding: 100px 32px 32px;
            min-height: 100vh;
        }

        .card-premium {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border-color);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card-premium:hover {
            transform: translateY(-4px);
            box-shadow: 0px 24px 48px rgba(112, 144, 176, 0.2);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 16px;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0px 10px 20px rgba(67, 24, 255, 0.23);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0px 14px 24px rgba(67, 24, 255, 0.3);
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F4F7FE;
            color: var(--primary);
        }

        @media (max-width: 1200px) {
            .navbar-prof { left: 20px; }
            .sidebar-prof { transform: translateX(-100%); }
            .main-content-prof { margin-left: 0; }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
    <style>
        /* Sidebar premium update */
        .logo-box {
            padding: 32px 24px;
            text-align: center;
        }
        
        .logo-text {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -1.5px;
            color: var(--secondary);
        }

        .user-card-mini {
            margin: 0 20px 30px;
            padding: 20px;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary-dark) 100%);
            border-radius: 24px;
            color: white;
            box-shadow: 0px 20px 30px rgba(67, 24, 255, 0.15);
        }

        /* Navbar premium update */
        .search-bar {
            background: #F4F7FE;
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 350px;
            transition: all 0.3s ease;
        }

        .search-bar:focus-within {
            background: white;
            border-color: var(--primary);
            box-shadow: 0px 10px 20px rgba(67, 24, 255, 0.05);
        }

        .nav-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F4F7FE;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            color: var(--primary);
            background: var(--primary-light);
        }
    </style>
</head>
<body>

<aside class="sidebar-prof">
    <div class="logo-box">
        <span class="logo-text text-primary">L'Érudition</span>
    </div>

    <div class="user-card-mini">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-2xl bg-white/20 flex items-center justify-center font-black text-xl">
                <span th:text="${professeur != null ? #strings.substring(professeur.prenom, 0, 1) : 'P'}">P</span>
            </div>
            <div class="min-w-0">
                <p class="text-sm font-bold truncate" th:text="${professeur != null ? professeur.prenom + ' ' + professeur.nom : 'Professeur'}">Professeur</p>
                <p class="text-[10px] opacity-60 font-bold uppercase tracking-widest" th:text="${professeur != null ? professeur.specialite : 'Formateur'}">Formateur</p>
            </div>
        </div>
    </div>

    <nav class="flex flex-col gap-2">
        <a href="/professeur/dashboard" class="nav-item" th:classappend="${currentPage == 'dashboard'} ? 'active' : ''">
            <i class="fi fi-sr-apps"></i>
            <span>Dashboard</span>
        </a>
        <a href="/professeur/cours" class="nav-item" th:classappend="${currentPage == 'cours'} ? 'active' : ''">
            <i class="fi fi-br-book-alt"></i>
            <span>Mes formations</span>
        </a>
        <a href="/professeur/etudiants" class="nav-item" th:classappend="${currentPage == 'etudiants'} ? 'active' : ''">
            <i class="fi fi-br-users-alt"></i>
            <span>Mes étudiants</span>
        </a>
        <a href="/messages" class="nav-item" th:classappend="${currentPage == 'messages'} ? 'active' : ''">
            <i class="fi fi-br-comment-dots"></i>
            <span>Messagerie</span>
        </a>
        
        <div class="mt-auto pt-10">
            <div class="mx-6 p-4 rounded-2xl bg-primary/5 mb-6">
                <p class="text-[10px] font-black text-primary uppercase tracking-widest mb-1">Support 24/7</p>
                <p class="text-xs text-muted">Avez-vous besoin d'aide ?</p>
            </div>
            <a href="/logout" class="nav-item text-red-500 hover:bg-red-50">
                <i class="fi fi-br-exit"></i>
                <span>Déconnexion</span>
            </a>
        </div>
    </nav>
</aside>

<nav class="navbar-prof">
    <div class="search-bar">
        <i class="fi fi-br-search text-muted"></i>
        <input type="text" placeholder="Rechercher..." class="bg-transparent border-none outline-none text-sm font-medium w-full">
    </div>
    
    <div class="flex items-center gap-4">
        <button class="nav-btn relative" onclick="window.location.href='/messages'">
            <i class="fi fi-br-bell"></i>
            <span id="globalNotificationBadge" class="absolute top-2 right-2 w-3.5 h-3.5 bg-red-500 rounded-full text-[8px] text-white items-center justify-center font-bold" style="display: none;">0</span>
        </button>
        <button class="nav-btn">
            <i class="fi fi-br-settings"></i>
        </button>
        <div class="h-8 w-px bg-border-color mx-2"></div>
        <div class="flex items-center gap-3">
            <div class="text-right hidden sm:block">
                <p class="text-xs font-black text-secondary" th:text="${professeur != null ? professeur.prenom + ' ' + professeur.nom : 'Professeur'}">Professeur</p>
                <p class="text-[9px] text-muted font-bold uppercase tracking-tighter">Compte Certifié</p>
            </div>
            <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white font-black shadow-lg shadow-primary/20">
                <i class="fi fi-sr-user"></i>
            </div>
        </div>
    </div>
</nav>

<main class="main-content-prof">
    <div layout:fragment="content"></div>
</main>

<div layout:fragment="modals"></div>

<script layout:fragment="script"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script th:inline="javascript">
    let globalStompClient = null;
    const layoutUserId = /*[[${professeur != null ? professeur.id : (etudiant != null ? etudiant.id : (userId != null ? userId : ''))}]]*/ '';
    
    if (layoutUserId) {
        const socket = new SockJS('/ws');
        globalStompClient = Stomp.over(socket);
        globalStompClient.debug = null;
        globalStompClient.connect({}, function (frame) {
            globalStompClient.subscribe('/topic/notifications/' + layoutUserId, function (notification) {
                const badge = document.getElementById('globalNotificationBadge');
                if (badge) {
                    let count = parseInt(badge.innerText) || 0;
                    badge.innerText = count + 1;
                    badge.style.display = 'flex';
                }
            });
        });
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{professeur/layout}" lang="fr">
<head>
    <title>Dashboard - L'Érudition Augmentée</title>
    <meta name="_csrf" th:content="${_csrf != null ? _csrf.token : ''}"/>
    <meta name="_csrf_header" th:content="${_csrf != null ? _csrf.headerName : ''}"/>
</head>
<body>
<!-- Main Content -->
<main class="main-content" layout:fragment="content">
    <div class="max-w-7xl mx-auto">
        <!-- Header Section -->
        <div class="mb-8">
            <h1 class="text-3xl md:text-4xl font-black text-text-dark mb-2">Dashboard</h1>
            <p class="text-text-muted mb-6">Bienvenue sur votre espace de gestion des cours</p>
            <a href="/professeur/cours/ajouter" class="inline-flex items-center gap-2 bg-primary text-white px-6 py-3 rounded-lg hover:bg-primary/90 transition-colors font-medium">
                <span class="material-symbols-outlined" style="font-size: 1.25rem;">add</span>
                <span>Nouveau cours</span>
            </a>
        </div>

        <!-- Statistics Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Stat Card 1: Total Courses -->
            <div class="bg-white rounded-lg border border-border-color p-6 shadow-sm hover:shadow-md hover:border-primary transition-all">
                <div class="flex items-start justify-between">
                    <div>
                        <p class="text-sm font-medium text-text-muted mb-1">Total des cours</p>
                        <p class="text-2xl font-bold text-primary" th:text="${totalCours}">0</p>
                    </div>
                    <span class="material-symbols-outlined text-primary/20" style="font-size: 2.5rem;">menu_book</span>
                </div>
            </div>

            <!-- Stat Card 2: Published Courses -->
            <div class="bg-white rounded-lg border border-border-color p-6 shadow-sm hover:shadow-md hover:border-primary transition-all">
                <div class="flex items-start justify-between">
                    <div>
                        <p class="text-sm font-medium text-text-muted mb-1">Cours publiés</p>
                        <p class="text-2xl font-bold text-primary" th:text="${coursPublies}">0</p>
                    </div>
                    <span class="material-symbols-outlined text-primary/20" style="font-size: 2.5rem;">publish</span>
                </div>
            </div>

            <!-- Stat Card 3: Total Students -->
            <div class="bg-white rounded-lg border border-border-color p-6 shadow-sm hover:shadow-md hover:border-primary transition-all">
                <div class="flex items-start justify-between">
                    <div>
                        <p class="text-sm font-medium text-text-muted mb-1">Étudiants inscrits</p>
                        <p class="text-2xl font-bold text-primary" th:text="${totalEtudiants}">0</p>
                    </div>
                    <span class="material-symbols-outlined text-primary/20" style="font-size: 2.5rem;">groups</span>
                </div>
            </div>

            <!-- Stat Card 4: Average Progress -->
            <div class="bg-white rounded-lg border border-border-color p-6 shadow-sm hover:shadow-md hover:border-primary transition-all">
                <div class="flex items-start justify-between">
                    <div>
                        <p class="text-sm font-medium text-text-muted mb-1">Progression moyenne</p>
                        <p class="text-2xl font-bold text-primary">
                            <span th:text="${progressionMoyenne}">0</span>%
                        </p>
                    </div>
                    <span class="material-symbols-outlined text-primary/20" style="font-size: 2.5rem;">trending_up</span>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>

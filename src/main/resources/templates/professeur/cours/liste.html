<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{professeur/layout}" lang="fr">
<head>
    <title>Mes cours - L'Érudition</title>
</head>
<body>
<div layout:fragment="content" class="animate-fade">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
        <div>
            <h1 class="text-4xl font-black text-secondary">Mes formations</h1>
            <p class="text-muted font-medium mt-1">Gérez et suivez l'évolution de vos cours</p>
        </div>
        <a href="/professeur/cours/ajouter" class="btn-primary flex items-center gap-3">
            <i class="fi fi-br-add"></i>
            <span>Nouvelle formation</span>
        </a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
        <div th:each="c : ${cours}" class="card-premium !p-0 overflow-hidden flex flex-col">
            <div class="h-48 relative overflow-hidden group">
                <img th:src="${c.imageCouverture}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" th:if="${c.imageCouverture != null}">
                <div class="w-full h-full bg-gradient-to-br from-primary/20 to-secondary/20 flex items-center justify-center text-[#003178]" th:unless="${c.imageCouverture != null}">
                    <i class="fi fi-br-book text-4xl opacity-30"></i>
                </div>
                <div class="absolute top-4 left-4">
                    <span th:if="${c.publie}" class="text-[10px] bg-white/90 backdrop-blur-md text-accent px-4 py-1.5 rounded-full font-black uppercase shadow-sm">Publié</span>
                    <span th:unless="${c.publie}" class="text-[10px] bg-white/90 backdrop-blur-md text-orange-500 px-4 py-1.5 rounded-full font-black uppercase shadow-sm">Brouillon</span>
                </div>
            </div>
            
            <div class="p-6 flex-1 flex flex-col">
                <h3 class="font-bold text-xl text-secondary mb-3 line-clamp-1" th:text="${c.titre}">Titre du cours</h3>
                <p class="text-sm text-muted font-medium line-clamp-2 mb-6" th:text="${c.descriptionCourte}">Description courte...</p>
                
                <div class="flex items-center gap-6 mb-8 text-xs font-bold text-secondary">
                    <div class="flex items-center gap-2">
                        <i class="fi fi-br-users-alt text-[#003178]"></i>
                        <span th:text="${c.nombreApprenants} + ' inscrits'">0</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <i class="fi fi-br-clock text-[#003178]"></i>
                        <span th:text="${c.dureeEstimee} + ' min'">0 min</span>
                    </div>
                </div>

                <div class="mt-auto flex gap-3">
                    <a th:href="'/professeur/cours/' + ${c.id} + '/gerer'" class="flex-1 text-center py-3 bg-[#003178]/5 text-[#003178] rounded-xl font-bold hover:bg-blue-700 hover:text-white transition-all text-sm">
                        Gérer le cours
                    </a>
                    <form th:action="'/professeur/cours/' + ${c.id} + '/supprimer'" method="post" onsubmit="return confirm('Supprimer définitivement ce cours ?')">
                        <button type="submit" class="w-12 h-12 flex items-center justify-center bg-red-50 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition-all">
                            <i class="fi fi-br-trash"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${cours == null or #lists.isEmpty(cours)}" class="card-premium py-24 text-center">
        <div class="w-24 h-24 bg-[#003178]/5 text-[#003178] rounded-full flex items-center justify-center mx-auto mb-6 text-5xl">
            <i class="fi fi-br-book-alt"></i>
        </div>
        <h3 class="text-2xl font-black text-secondary mb-3">Vous n'avez pas encore de cours</h3>
        <p class="text-muted max-w-sm mx-auto mb-10">Commencez dès aujourd'hui en créant votre première formation interactive.</p>
        <a href="/professeur/cours/ajouter" class="btn-primary inline-flex items-center gap-3">
            <i class="fi fi-br-add"></i>
            <span>Créer mon premier cours</span>
        </a>
    </div>
</div>
</body>
</html>

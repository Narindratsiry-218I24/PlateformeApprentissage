<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{professeur/layout}" lang="fr">
<head>
  <title>Quiz du cours - L'Érudition</title>
  <style>
    .hero-panel { background: linear-gradient(135deg, var(--primary) 0%, #1e5ca6 58%, #1f8a80 100%); }
    .surface-card { background: rgba(255,255,255,0.96); border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 18px 42px rgba(15,23,42,0.08); }
  </style>
</head>
<body>
<div layout:fragment="content">
  <div class="hero-panel rounded-2xl p-6 md:p-8 text-white mb-8">
    <a th:href="'/professeur/cours/' + ${cours.id} + '/gerer'" class="inline-flex items-center gap-2 text-white/80 hover:text-white mb-4 transition-colors">
      <i class="fas fa-arrow-left"></i> Retour au cours
    </a>
    <p class="text-xs uppercase tracking-wider text-white/70 mb-2">Espace professeur</p>
    <h1 class="text-2xl md:text-3xl font-black">Quiz de <span th:text="${cours.titre}">Cours</span></h1>
    <p class="text-white/80 mt-2 max-w-2xl">Créez des quiz, ajoutez des questions et pilotez l'expérience étudiant</p>
  </div>

  <div th:if="${success}" class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl mb-6">
    <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
  </div>

  <div class="surface-card rounded-2xl p-6 mb-8">
    <div class="flex items-center gap-3 mb-4">
      <div class="w-10 h-10 rounded-xl bg-yellow-500 flex items-center justify-center"><i class="fas fa-plus-circle text-white"></i></div>
      <h2 class="text-xl font-bold text-gray-900">Creer un nouveau quiz</h2>
    </div>
    <form th:action="'/professeur/cours/' + ${cours.id} + '/quiz/ajouter'" method="post" th:object="${nouveauQuiz}">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div><label class="block text-sm font-semibold text-gray-700 mb-1">Titre du quiz *</label><input type="text" th:field="*{titre}" required class="w-full rounded-xl border border-gray-200 px-4 py-3 focus:border-primary"></div>
        <div><label class="block text-sm font-semibold text-gray-700 mb-1">Description</label><input type="text" th:field="*{description}" class="w-full rounded-xl border border-gray-200 px-4 py-3 focus:border-primary"></div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div><label class="block text-sm font-semibold text-gray-700 mb-1">Temps par question (sec)</label><input type="number" th:field="*{tempsParQuestion}" min="30" max="600" class="w-full rounded-xl border border-gray-200 px-4 py-3 focus:border-primary"></div>
        <div><label class="block text-sm font-semibold text-gray-700 mb-1">Temps total (sec, optionnel)</label><input type="number" th:field="*{totalTemps}" min="60" class="w-full rounded-xl border border-gray-200 px-4 py-3 focus:border-primary"></div>
      </div>
      <button type="submit" class="bg-primary text-white px-5 py-3 rounded-xl hover:bg-primary-dark transition-colors flex items-center gap-2"><i class="fas fa-plus"></i> Creer le quiz</button>
    </form>
  </div>

  <div class="surface-card rounded-2xl overflow-hidden">
    <div class="px-6 py-4 border-b border-gray-100 bg-gray-50/50"><h2 class="text-lg font-bold text-gray-900"><i class="fas fa-list text-primary mr-2"></i> Quiz existants</h2></div>
    <div class="p-6">
      <div th:if="${#lists.isEmpty(quizzes)}" class="text-center py-12 text-gray-400"><i class="fas fa-clipboard-list text-5xl mb-3 block"></i><p>Aucun quiz pour l'instant</p></div>
      <div th:if="${not #lists.isEmpty(quizzes)}" class="space-y-4">
        <div th:each="quiz : ${quizzes}" class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 border border-gray-200 p-5 rounded-xl bg-white hover:shadow-md transition">
          <div class="flex items-start gap-4">
            <div class="w-12 h-12 rounded-xl bg-blue-100 flex items-center justify-center"><i class="fas fa-clipboard-list text-primary text-xl"></i></div>
            <div><h3 class="font-bold text-gray-900" th:text="${quiz.titre}">Titre</h3><p class="text-sm text-gray-500" th:text="${quiz.description}">Description</p><p class="text-xs text-primary font-semibold mt-1" th:text="${quiz.questions.size()} + ' question(s)'">0 question(s)</p></div>
          </div>
          <a th:href="'/professeur/quiz/' + ${quiz.id}" class="text-primary hover:text-primary-dark bg-blue-50 px-5 py-3 rounded-xl border border-blue-100 inline-flex items-center justify-center gap-2 font-semibold transition-colors"><i class="fas fa-pen"></i> Gerer questions</a>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{professeur/layout}" lang="fr">
<head>
  <title th:text="${quiz.titre} + ' - Détail quiz'">Détail quiz</title>
</head>
<body>
<div layout:fragment="content">
  <div class="mb-8">
    <a th:href="'/professeur/cours/' + ${quiz.cours.id} + '/quiz'" class="inline-flex items-center gap-2 text-gray-500 hover:text-primary mb-4 transition-colors">
      <i class="fas fa-arrow-left"></i> Retour aux quiz
    </a>
    <div class="hero-panel rounded-2xl p-6 bg-gradient-to-r from-primary to-secondary/80 text-white">
      <h1 class="text-2xl md:text-3xl font-black" th:text="${quiz.titre}">Titre du Quiz</h1>
      <p class="text-white/80 mt-1" th:text="${quiz.description}">Description</p>
    </div>
  </div>

  <div th:if="${success}" class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl mb-6"><i class="fas fa-check-circle"></i> <span th:text="${success}"></span></div>

  <div class="bg-white rounded-2xl p-6 mb-8 shadow-sm border border-gray-100">
    <div class="flex items-center gap-3 mb-4"><div class="w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center"><i class="fas fa-circle-question text-primary text-xl"></i></div><h2 class="text-xl font-bold text-gray-900">Ajouter une question</h2></div>
    <form th:action="'/professeur/quiz/' + ${quiz.id} + '/question/ajouter'" method="post" th:object="${nouvelleQuestion}">
      <textarea th:field="*{texteQuestion}" required rows="2" class="w-full rounded-xl border border-gray-200 px-4 py-3 focus:border-primary mb-4" placeholder="Entrez votre question..."></textarea>
      <button type="submit" class="bg-primary text-white px-5 py-3 rounded-xl hover:bg-primary-dark transition-colors flex items-center gap-2"><i class="fas fa-plus"></i> Ajouter la question</button>
    </form>
  </div>

  <div class="space-y-6">
    <div th:each="question, qStat : ${quiz.questions}" class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
      <div class="px-6 py-4 border-b border-gray-100 bg-gray-50/50">
        <h3 class="font-bold text-gray-900 flex items-center gap-3"><span class="w-8 h-8 rounded-xl bg-primary text-white flex items-center justify-center text-sm font-bold" th:text="${qStat.index + 1}">1</span> <span th:text="${question.texteQuestion}">Question</span></h3>
      </div>
      <div class="p-6">
        <ul class="space-y-2 mb-4">
          <li th:each="rep : ${question.reponses}" class="flex items-center gap-3 p-3 rounded-xl" th:classappend="${rep.estCorrecte} ? 'bg-green-50 border border-green-200' : 'bg-gray-50 border border-gray-200'">
            <span th:if="${rep.estCorrecte}" class="w-6 h-6 rounded-full bg-green-500 text-white flex items-center justify-center text-xs"><i class="fas fa-check"></i></span>
            <span th:unless="${rep.estCorrecte}" class="w-6 h-6 rounded-full bg-gray-300 flex items-center justify-center text-xs"><i class="fas fa-xmark"></i></span>
            <span th:text="${rep.texteReponse}">Réponse</span>
          </li>
        </ul>
        <div th:if="${#lists.isEmpty(question.reponses)}" class="text-sm text-gray-400 italic mb-4">Aucune réponse définie</div>

        <form th:action="'/professeur/question/' + ${question.id} + '/reponse/ajouter'" method="post" class="flex flex-col md:flex-row gap-4 bg-gray-50 p-4 rounded-xl border border-gray-200">
          <input type="hidden" name="quizId" th:value="${quiz.id}">
          <div class="flex-1"><input type="text" name="texteReponse" placeholder="Nouvelle réponse..." required class="w-full rounded-xl border border-gray-200 px-4 py-2.5"></div>
          <div class="flex items-center gap-2"><input type="checkbox" name="estCorrecte" value="true" class="w-4 h-4 text-primary"><label class="text-sm text-gray-700">Correcte</label></div>
          <button type="submit" class="bg-primary text-white px-5 py-2.5 rounded-xl hover:bg-primary-dark transition-colors flex items-center gap-2"><i class="fas fa-plus"></i> Ajouter</button>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>

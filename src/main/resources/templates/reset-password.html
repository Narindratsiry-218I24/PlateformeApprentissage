<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Réinitialiser le mot de passe - L'Érudition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563eb',
            'primary-dark': '#1d4ed8',
            surface: {
              low: '#f8fafc',
            }
          },
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          },
          animation: {
            'slide-up': 'slideUp 0.5s ease-out forwards',
          },
          keyframes: {
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; transition: all 0.3s; }
    
    .input-animate {
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }
    .input-animate:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
      transform: scale(1.01);
    }
    .input-container:focus-within .material-symbols-outlined {
      color: #2563eb;
      transform: scale(1.1);
    }
    
    .btn-animate {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-animate:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4);
    }
    .btn-animate:active {
      transform: translateY(0) scale(0.98);
    }

    #match-indicator {
      transition: all 0.3s ease;
      opacity: 0;
      height: 0;
      overflow: hidden;
    }
    #match-indicator.show {
      opacity: 1;
      height: 20px;
      margin-top: 8px;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8">

<div class="w-full max-w-lg bg-white rounded-[2rem] shadow-2xl p-10 md:p-12 animate-slide-up relative overflow-hidden">
  
  <div class="absolute -top-24 -left-24 w-48 h-48 rounded-full bg-primary/5 blur-3xl"></div>
  <div class="absolute -bottom-24 -right-24 w-48 h-48 rounded-full bg-primary/5 blur-3xl"></div>

  <div class="relative z-10">
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-50 text-primary rounded-full mb-6 shadow-sm">
        <span class="material-symbols-outlined text-4xl">password</span>
      </div>
      <h1 class="text-3xl font-black text-slate-800 mb-3 tracking-tight">Nouveau mot de passe</h1>
      <p class="text-slate-500 font-medium leading-relaxed">
        Choisissez un mot de passe sécurisé.
      </p>
    </div>

    <!-- Message d'erreur potentiel du serveur -->
    <div th:if="${error != null}" class="mb-8 p-4 bg-red-50 border border-red-200 text-red-700 rounded-2xl flex items-center gap-3">
      <span class="material-symbols-outlined text-red-500">error</span>
      <p class="text-sm font-bold" th:text="${error}"></p>
    </div>

    <form th:action="@{/reset-password}" method="post" class="space-y-6" id="resetForm">
      
      <input type="hidden" name="token" th:value="${token}" />
      
      <div class="space-y-2">
        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 block px-1">Nouveau mot de passe</label>
        <div class="relative input-container">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
            <span class="material-symbols-outlined text-xl">lock</span>
          </div>
          <input type="password" name="password" id="password" required minlength="6"
                 class="w-full pl-12 pr-12 py-4 bg-surface-low rounded-2xl text-slate-800 font-semibold outline-none input-animate"
                 placeholder="••••••••"/>
          <button type="button" onclick="togglePassword('password', 'toggle-icon-1')"
                  class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-primary transition-colors focus:outline-none">
            <span class="material-symbols-outlined" id="toggle-icon-1">visibility</span>
          </button>
        </div>
      </div>

      <div class="space-y-2">
        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 block px-1">Confirmer le mot de passe</label>
        <div class="relative input-container">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
            <span class="material-symbols-outlined text-xl">lock_check</span>
          </div>
          <input type="password" name="confirmPassword" id="confirmPassword" required minlength="6"
                 class="w-full pl-12 pr-12 py-4 bg-surface-low rounded-2xl text-slate-800 font-semibold outline-none input-animate"
                 placeholder="••••••••"/>
          <button type="button" onclick="togglePassword('confirmPassword', 'toggle-icon-2')"
                  class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-primary transition-colors focus:outline-none">
            <span class="material-symbols-outlined" id="toggle-icon-2">visibility</span>
          </button>
        </div>
        
        <!-- Indicateur de correspondance -->
        <div id="match-indicator" class="flex items-center gap-2 px-2">
          <span class="material-symbols-outlined text-sm" id="match-icon"></span>
          <span class="text-xs font-bold" id="match-text"></span>
        </div>
      </div>

      <button type="submit" id="submitBtn"
              class="w-full py-4 bg-primary text-white text-sm font-black rounded-2xl btn-animate mt-4">
        RÉINITIALISER LE MOT DE PASSE
      </button>
    </form>

    <div class="mt-8 text-center border-t border-slate-100 pt-8">
      <a th:href="@{/login}" class="inline-flex items-center gap-2 text-slate-500 hover:text-primary font-bold transition-colors">
        <span class="material-symbols-outlined text-sm">arrow_back</span>
        Retour à la connexion
      </a>
    </div>
  </div>
</div>

<script>
  function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === 'password') {
      input.type = 'text';
      icon.textContent = 'visibility_off';
    } else {
      input.type = 'password';
      icon.textContent = 'visibility';
    }
  }

  const passInput = document.getElementById('password');
  const confirmInput = document.getElementById('confirmPassword');
  const indicator = document.getElementById('match-indicator');
  const matchIcon = document.getElementById('match-icon');
  const matchText = document.getElementById('match-text');

  function checkMatch() {
    const p1 = passInput.value;
    const p2 = confirmInput.value;

    if (p1.length > 0 && p2.length > 0) {
      indicator.classList.add('show');
      if (p1 === p2) {
        matchIcon.textContent = 'check_circle';
        matchIcon.className = 'material-symbols-outlined text-sm text-emerald-500';
        matchText.textContent = 'Les mots de passe correspondent';
        matchText.className = 'text-xs font-bold text-emerald-600';
        confirmInput.classList.remove('border-red-400');
        confirmInput.classList.add('border-emerald-400');
      } else {
        matchIcon.textContent = 'cancel';
        matchIcon.className = 'material-symbols-outlined text-sm text-red-500';
        matchText.textContent = 'Les mots de passe ne correspondent pas';
        matchText.className = 'text-xs font-bold text-red-600';
        confirmInput.classList.add('border-red-400');
        confirmInput.classList.remove('border-emerald-400');
      }
    } else {
      indicator.classList.remove('show');
      confirmInput.classList.remove('border-red-400', 'border-emerald-400');
    }
  }

  passInput.addEventListener('input', checkMatch);
  confirmInput.addEventListener('input', checkMatch);

  document.getElementById('resetForm').addEventListener('submit', function(e) {
    if (passInput.value !== confirmInput.value) {
      e.preventDefault();
      alert('Veuillez vous assurer que les mots de passe correspondent.');
    }
  });
</script>

</body>
</html>
